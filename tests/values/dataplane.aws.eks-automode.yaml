# helm-values: examples/values.aws.eks-automode.yaml,examples/values-test-certs.yaml
# Exercises the EKS Auto Mode example template
# (charts/dataplane/examples/values.aws.eks-automode.yaml) as a standalone
# alternative to the values.aws.yaml sibling overlay. EKS Auto Mode is a
# separate AWS deployment style (Karpenter-managed nodes, AL2023 only), not
# a delta on top of the AWS overlay -- so this fixture layers the example
# directly and fills only the placeholders it leaves empty.

global:
  UNION_CONTROL_PLANE_HOST: "test-controlplane-host"
  CLUSTER_NAME: "test-cluster-name"
  ORG_NAME: "test-org-name"
  AUTH_CLIENT_ID: "test-client-id"
  METADATA_BUCKET: "test-metadata-bucket"
  FAST_REGISTRATION_BUCKET: "test-fast-registration-bucket"
  AWS_ACCOUNT_ID: "123456789012"
  AWS_REGION: "us-east-2"
  BACKEND_IAM_ROLE_ARN: "arn:aws:iam::123456789012:role/test-backend"
  WORKER_IAM_ROLE_ARN: "arn:aws:iam::123456789012:role/test-worker"

secrets:
  admin:
    create: true
    clientSecret: "test-not-real-secret"
