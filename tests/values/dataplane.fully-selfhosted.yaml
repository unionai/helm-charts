# helm-values: examples/values-test-certs.yaml
global:
  # Control-plane host so the dataplane→CP connection resolves. Without it the
  # dataplane.cp.host template's required guard fails the render.
  UNION_CONTROL_PLANE_HOST: "test-controlplane-host"
# Test namespace_mapping cascading to all services
namespace_mapping:
  template: '{{`{{ project }}`}}-{{`{{ domain }}`}}'

serving:
  auth:
    enabled: false

ingress:
  enabled: true
  dataproxy:
    class: nginx
    hostOverride: ingress-nginx-internal.ingress-nginx.svc.cluster.local
  serving:
    class: nginx

secrets:
  admin:
    enable: false
    create: false

config:
  union:
    auth:
      enable: false
  operator:
    enableTunnelService: false
    billableUsageCollector:
      enabled: false

operator:
  enableTunnelService: false

clusterresourcesync:
  config:
    union:
      auth:
        enable: false