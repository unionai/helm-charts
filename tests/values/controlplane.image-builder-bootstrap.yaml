global:
  UNION_HOST: "test.example.com"
  UNION_ORG: "test-org"
  INTERNAL_CLIENT_ID: "test-internal-client-id"
  AUTH_TOKEN_URL: "https://test.example.com/oauth2/v1/token"

dbHost: "db-instance-url"
dbName: "dbName"
dbUser: "dbUser"
dbPass: "dbPass"
bucketName: "bucketName"
artifactsBucketName: "artifactsBucketName"

configMap:
  connection:
    environment: staging
    region: us-east-2
    rootTenantURLPattern: dns:///fake-host.domain
controlplane:
  enabled: true
ingress:
  host: fake-host.domain
  tls:
    - hosts:
        - fake-host.domain
      secretName: fake-host-tls-secret
flyte:
  common:
    ingress:
      tls:
        secretName: fake-host-tls-secret
      host: fake-host.domain
  configmap:
    admin:
      admin:
        endpoint: dns:///fake-host.domain
        insecure: false

# Opt in to the build-image bootstrap Job (disabled by default) so the
# Job + ConfigMap templates stay covered by snapshot tests.
imageBuilder:
  bootstrap:
    enabled: true
