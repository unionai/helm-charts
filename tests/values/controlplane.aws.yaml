global:
  UNION_HOST: "test.example.com"
  UNION_ORG: "test-org"
  INTERNAL_CLIENT_ID: "test-internal-client-id"
  AUTH_TOKEN_URL: "https://test.example.com/oauth2/v1/token"
  # Single attached dataplane — pins the snapshot for leasor's auto-generated
  # queueSync.queues (default queue with all clusters + one queue per cluster).
  LEASOR_ATTACHED_CLUSTERS: ["test-cluster"]

dbHost: "db-instance-url"
# -- Set the DB Name used for the control plane services
dbName: "dbName"
# -- Set the DB user used for the control plane services
dbUser: "dbUser"
# -- Set the DB password used for the controlplane services
dbPass: "dbPass"
# -- Set the S3 bucket name used for flyte storage
bucketName: "bucketName"
# -- Set the S3 bucket name used for artifacts storage
artifactsBucketName: "artifactsBucketName"

configMap:
  connection:
    environment: staging
    region: us-east-2
    rootTenantURLPattern: dns:///fake-host.domain
controlplane:
  enabled: true
ingress:
  host: fake-host.domain
  # extraHosts: alt-shared reuses the primary cert (SAN); alt-own-cert has its
  # own tls[] entry with a different secret (SNI selection).
  extraHosts:
    - alt-shared.example.com
    - alt-own-cert.example.com
  tls:
    - hosts:
        - fake-host.domain
        - alt-shared.example.com
      secretName: fake-host-tls-secret
    - hosts:
        - alt-own-cert.example.com
      secretName: alt-own-cert-tls-secret
flyte:
  common:
    ingress:
      tls:
        secretName: fake-host-tls-secret
      host: fake-host.domain

  datacatalog:
    autoscaling:
      enabled: true

  flyteadmin:
    autoscaling:
      enabled: true

      # Test setting custom values
      minReplicas: 4
      maxReplicas: 10
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70

    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/adminflyterole

  configmap:
    admin:
      admin:
        endpoint: dns:///fake-host.domain
        insecure: false

# Global podAnnotations — should appear on all CP deployments
podAnnotations:
  prometheus.io/scrape: "true"
