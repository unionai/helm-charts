global:
  UNION_HOST: "test.example.com"
  INTERNAL_CLIENT_ID: "test-internal-client-id"
  AUTH_TOKEN_URL: "https://test.example.com/oauth2/v1/token"

dbHost: "db-instance-url"
# -- Set the DB Name used for the control plane services
dbName: "dbName"
# -- Set the DB user used for the control plane services
dbUser: "dbUser"
# -- Set the DB password used for the controlplane services
dbPass: "dbPass"
# -- Set the S3 bucket name used for flyte storage
bucketName: "bucketName"
# -- Set the S3 bucket name used for artifacts storage
artifactsBucketName: "artifactsBucketName"

configMap:
  connection:
    environment: staging
    region: us-east-2
    rootTenantURLPattern: dns:///fake-host.domain
controlplane:
  enabled: true

# Chart-wide annotations applied to every union Service (cluster,
# dataproxy, executions, identity, authorizer, ...).
service:
  annotations:
    platform.union.ai/team: platform
    external-dns.alpha.kubernetes.io/hostname: '{{ .Values.global.UNION_HOST }}'

# Per-service annotation override — merged on top of chart-wide
# defaults; per-service wins on key collision. Only `cluster` opts in.
services:
  cluster:
    service:
      annotations:
        # Adds a per-service annotation (no conflict)
        platform.union.ai/owner: cluster-svc-admin
        # Overrides the chart-wide team annotation
        platform.union.ai/team: cluster-platform
ingress:
  host: fake-host.domain
  tls:
    - hosts:
        - fake-host.domain
      secretName: fake-host-tls-secret
flyte:
  common:
    ingress:
      tls:
        secretName: fake-host-tls-secret
      host: fake-host.domain

  datacatalog:
    autoscaling:
      enabled: true

  flyteadmin:
    autoscaling:
      enabled: true

      # Test setting custom values
      minReplicas: 4
      maxReplicas: 10
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70

    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/adminflyterole

  configmap:
    admin:
      admin:
        endpoint: dns:///fake-host.domain
        insecure: false

# Global podAnnotations — should appear on all CP deployments
podAnnotations:
  prometheus.io/scrape: "true"
