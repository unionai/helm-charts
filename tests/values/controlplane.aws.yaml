# helm-values: values.aws.yaml
# Exercises the AWS sibling overlay (charts/controlplane/values.aws.yaml) by
# layering it and filling only the placeholders the overlay leaves empty.
# Anything that used to live inline here moved into the overlay, so a change
# there flows into this snapshot automatically.
#
# Subsumes the dropped controlplane.aws.billing-enable.yaml fixture: the
# billing toggle is enabled below.

global:
  UNION_HOST: "test.example.com"
  UNION_ORG: "test-org"
  AWS_REGION: "us-east-2"
  DB_HOST: "db-instance-url"
  DB_NAME: "dbName"
  DB_USER: "dbUser"
  BUCKET_NAME: "bucketName"
  ARTIFACTS_BUCKET_NAME: "artifactsBucketName"
  DATAPLANE_HOST: "http://dataplane-nginx-controller.dataplane.svc.cluster.local:80"
  ARTIFACT_IAM_ROLE_ARN: "arn:aws:iam::123456789012:role/artifactsrole"
  FLYTEADMIN_IAM_ROLE_ARN: "arn:aws:iam::123456789012:role/adminflyterole"
  INTERNAL_CLIENT_ID: "test-internal-client-id"
  AUTH_TOKEN_URL: "https://test.example.com/oauth2/v1/token"

dbPass: "dbPass"

configMap:
  connection:
    environment: staging
    rootTenantURLPattern: dns:///fake-host.domain

controlplane:
  enabled: true

ingress:
  host: fake-host.domain
  # extraHosts: alt-shared reuses the primary cert (SAN); alt-own-cert has its
  # own tls[] entry with a different secret (SNI selection).
  extraHosts:
    - alt-shared.example.com
    - alt-own-cert.example.com
  tls:
    - hosts:
        - fake-host.domain
        - alt-shared.example.com
      secretName: fake-host-tls-secret
    - hosts:
        - alt-own-cert.example.com
      secretName: alt-own-cert-tls-secret

flyte:
  common:
    ingress:
      tls:
        secretName: fake-host-tls-secret
      host: fake-host.domain
  datacatalog:
    autoscaling:
      enabled: true
  flyteadmin:
    autoscaling:
      enabled: true
      minReplicas: 4
      maxReplicas: 10
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70
  configmap:
    admin:
      admin:
        endpoint: dns:///fake-host.domain
        insecure: false

podAnnotations:
  prometheus.io/scrape: "true"

services:
  usage:
    configMap:
      billing:
        enable: true
