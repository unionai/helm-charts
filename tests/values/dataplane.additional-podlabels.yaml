# Minimal test to verify additionalPodLabels and additionalPodAnnotations
# This ensures labels/annotations appear on separate lines and don't get concatenated

host: union.test.union.ai
clusterName: union-test
orgName: union
provider: aws

storage:
  provider: aws
  authType: iam
  bucketName: test-bucket
  region: us-east-1

secrets:
  admin:
    create: true
    clientSecret: test-secret
    clientId: test-client

# The key test: additionalPodLabels should render on separate lines
additionalPodLabels:
  azure.workload.identity/use: "true"
  custom-label: "custom-value"

# additionalPodAnnotations should appear on all deployments (including executor)
additionalPodAnnotations:
  prometheus.io/scrape: "true"
