# helm-values: values.aws.selfhosted-intracluster.yaml
# Test fixture: Custom OIDC provider configuration.
# Exercises the OAuth2 globals for non-Okta IdPs (e.g. Entra ID, Keycloak).
# All values use generic, non-internal names.

global:
  UNION_HOST: "test.example.com"
  INTERNAL_CLIENT_ID: "test-internal-client-id"
  AUTH_TOKEN_URL: "https://idp.example.com/oauth2/v2.0/token"
  OIDC_BASE_URL: "https://idp.example.com/oauth2/v2.0"
  OIDC_CLIENT_ID: "00000000-1111-2222-3333-444444444444"
  CLI_CLIENT_ID: "55555555-6666-7777-8888-999999999999"
  OIDC_METADATA_URL: ".well-known/openid-configuration"
  OIDC_ALLOWED_AUDIENCE:
  - "api://my-app"
  - "00000000-1111-2222-3333-444444444444"
  OIDC_APP_SCOPE: "api://my-app/all"
  OIDC_APP_AUDIENCE: "api://my-app"

dbHost: "db-instance-url"
dbName: "dbName"
dbUser: "dbUser"
dbPass: "dbPass"
bucketName: "bucketName"
artifactsBucketName: "artifactsBucketName"

configMap:
  connection:
    environment: staging
    region: us-east-2
    rootTenantURLPattern: dns:///fake-host.domain
controlplane:
  enabled: true
ingress:
  host: fake-host.domain
  tls:
    - hosts:
        - fake-host.domain
      secretName: fake-host-tls-secret
flyte:
  common:
    ingress:
      tls:
        secretName: fake-host-tls-secret
      host: fake-host.domain
  configmap:
    admin:
      admin:
        endpoint: dns:///fake-host.domain
        insecure: false
    adminServer:
      auth:
        appAuth:
          # Identity type claim mapping for non-Okta IdPs.
          # This is set in values overlay, not via a global.
          identityTypeClaimsForApps:
            idtyp:
            - app
