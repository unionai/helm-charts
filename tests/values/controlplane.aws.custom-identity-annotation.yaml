# Intended to test charts/controlplane AWS identity annotation prefix overrides.

global:
  INTERNAL_CLIENT_ID: "test-internal-client-id"
  AUTH_TOKEN_URL: "https://test.example.com/oauth2/v1/token"

dbHost: "db-instance-url"
dbName: "dbName"
dbUser: "dbUser"
dbPass: "dbPass"
bucketName: "bucketName"
artifactsBucketName: "artifactsBucketName"

configMap:
  connection:
    environment: staging
    region: us-east-2
    rootTenantURLPattern: dns:///fake-host.domain

controlplane:
  enabled: true

ingress:
  host: fake-host.domain
  tls:
    - hosts:
        - fake-host.domain
      secretName: fake-host-tls-secret

services:
  artifacts:
    disabled: false
    serviceAccount:
      annotations:
        customer.example.com/role-arn: arn:aws:iam::<account-id>:role/artifactsrole

flyte:
  common:
    ingress:
      tls:
        secretName: fake-host-tls-secret
      host: fake-host.domain

  datacatalog:
    enabled: true
    serviceAccount:
      annotations:
        customer.example.com/role-arn: arn:aws:iam::<account-id>:role/adminflyterole

  cacheservice:
    serviceAccount:
      annotations:
        customer.example.com/role-arn: arn:aws:iam::<account-id>:role/adminflyterole

  flyteadmin:
    autoscaling:
      enabled: true
      minReplicas: 4
      maxReplicas: 10
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70
    serviceAccount:
      annotations:
        customer.example.com/role-arn: arn:aws:iam::<account-id>:role/adminflyterole

  configmap:
    admin:
      admin:
        endpoint: dns:///fake-host.domain
        insecure: false

podAnnotations:
  prometheus.io/scrape: "true"
