# helm-values: examples/values-test-certs.yaml
# Test fixture: flytepropeller enabled with the chart-managed custom PriorityClass.
# low_privilege: false so the cluster-scoped PriorityClass is created; exercises
# templates/propeller/priorityclass.yaml + the deployment's priorityClassName ref.
host: byok.us-west-2.union.ai
clusterName: test-e2e-propeller
orgName: byok
provider: gcp
low_privilege: false
storage:
  provider: gcs
  bucketName: test-gcp-bucket
  fastRegistrationBucketName: test-gcp-bucket
  region: us-central1
  enableMultiContainer: true
  gcp:
    projectId: test-gcp-project-123
secrets:
  admin:
    create: true
    clientId: byok-test-e2e-propeller-operator
    clientSecret: test-not-real-secret
additionalServiceAccountAnnotations:
  iam.gke.io/gcp-service-account: 'union-backend@test-gcp-project-123.iam.gserviceaccount.com'
userRoleAnnotationKey: iam.gke.io/gcp-service-account
userRoleAnnotationValue: union-worker@test-gcp-project-123.iam.gserviceaccount.com
flytepropeller:
  enabled: true
