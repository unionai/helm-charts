global:
  UNION_HOST: "test.example.com"
  INTERNAL_CLIENT_ID: "test-internal-client-id"
  AUTH_TOKEN_URL: "https://test.example.com/oauth2/v1/token"
  USE_EXTERNAL_IDENTITY: "true"

dbHost: "db-instance-url"
dbName: "dbName"
dbUser: "dbUser"
dbPass: "dbPass"
bucketName: "bucketName"
artifactsBucketName: "artifactsBucketName"

configMap:
  connection:
    environment: staging
    region: us-east-2
    rootTenantURLPattern: dns:///fake-host.domain
controlplane:
  enabled: true
ingress:
  host: fake-host.domain
  tls:
    - hosts:
        - fake-host.domain
      secretName: fake-host-tls-secret
flyte:
  common:
    ingress:
      tls:
        secretName: fake-host-tls-secret
      host: fake-host.domain
  configmap:
    admin:
      admin:
        endpoint: dns:///fake-host.domain
        insecure: false
    adminServer:
      # Subject claim resolution for non-Okta IdPs (FAB-205).
      auth:
        appAuth:
          subjectClaimNames:
          - sub
          - client_id

# External authorization — customer-provided gRPC server
services:
  authorizer:
    configMap:
      authorizer:
        type: "External"
        externalClient:
          grpcConfig:
            host: "dns:///my-authz-server.default.svc.cluster.local:50051"
            insecure: true
          failOpen: false
