# helm-values: examples/values-test-certs.yaml
global:
  # Control-plane host so the dataplane→CP connection resolves. Without it the
  # dataplane.cp.host template's required guard fails the render.
  UNION_CONTROL_PLANE_HOST: "test-controlplane-host"
cost:
  enabled: true
  serviceMonitor:
    matchLabels:
      app.kubernetes.io/name: kubecost
opencost:
  enabled: false
secrets:
  admin:
    create: false
