# helm-values: values-test-certs.yaml,values.aws.yaml,values.zero-trust.yaml
# Zero-trust BYOC AWS render exercising an override that the base
# zero-trust snapshot does not cover:
#   - .Values.host overridden to a value distinct from
#     .Values.global.UNION_CONTROL_PLANE_HOST. Locks in that gateway
#     bootstrap CORS allow_origin and the Envoy listener domain honor
#     `tpl .Values.host .` (and not the global directly).
#
# The dataproxy workload itself (Deployment + Service, plus the gateway
# envoy route/cluster) is exercised by the base zero-trust snapshot —
# values.zero-trust.yaml flips dataproxy.enabled to true by default.
# The chart's commonServiceAccount default (low_privilege + single-
# namespace mode) means the rendered Deployment uses serviceAccountName:
# union-system; the per-workload dataproxy-system SA template skips
# rendering, matching every other union-binary workload here.

global:
  UNION_CONTROL_PLANE_HOST: "test-controlplane-host"
  CLUSTER_NAME: "test-cluster-name"
  ORG_NAME: "test-org-name"
  CLIENT_ID: "test-client-id"
  METADATA_BUCKET: "test-metadata-bucket"
  FAST_REGISTRATION_BUCKET: "test-fast-registration-bucket"
  AWS_ACCOUNT_ID: "123456789012"
  AWS_REGION: "test-region"
  BACKEND_IAM_ROLE_ARN: "test-backend-iam-role-arn"
  WORKER_IAM_ROLE_ARN: "test-worker-iam-role-arn"

# Workaround: see dataplane.aws.zero-trust.yaml for context.
storage:
  type: "s3"
  s3:
    region: "test-region"

secrets:
  admin:
    clientSecret: "test-not-real-secret"

# Override host to a value distinct from global.UNION_CONTROL_PLANE_HOST.
host: "override.example.com"
