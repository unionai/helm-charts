# helm-values: examples/values-test-certs.yaml,values.aws.yaml

global:
  UNION_CONTROL_PLANE_HOST: "test-controlplane-host"
  CLUSTER_NAME: "test-cluster-name"
  ORG_NAME: "test-org-name"
  CLIENT_ID: "test-client-id"
  METADATA_BUCKET: "test-metadata-bucket"
  FAST_REGISTRATION_BUCKET: "test-fast-registration-bucket"
  AWS_ACCOUNT_ID: "123456789012"
  AWS_REGION: "test-region"
  BACKEND_IAM_ROLE_ARN: "test-backend-iam-role-arn"
  WORKER_IAM_ROLE_ARN: "test-worker-iam-role-arn"

storage:
  type: "s3"
  s3:
    region: "test-region"

secrets:
  admin:
    clientSecret: "test-not-real-secret"

zero_trust:
  enabled: true

knative-operator:
  enabled: false

# operator-prometheus remote_write -> control-plane metrics-gateway.
prometheus:
  server:
    global:
      external_labels:
        __replica__: ${POD_NAME}
    extraFlags:
      - enable-feature=expand-external-labels
    env:
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
    extraSecretMounts:
      - name: prometheus-remote-write-secret
        secretName: union-secret-auth
        mountPath: /etc/prometheus/secrets/app_secret
        subPath: app_secret
        readOnly: true
    remoteWrite:
      - url: "https://{{ .Values.global.UNION_CONTROL_PLANE_HOST }}/metrics/remote_write"
        oauth2:
          client_id: "test-org-name-test-cluster-name-operator"
          token_url: "https://test-controlplane-host/auth/token"
          client_secret_file: /etc/prometheus/secrets/app_secret
          scopes:
            - all
