# helm-values: values.azure.yaml,examples/values-test-certs.yaml
# Exercises the Azure sibling overlay (charts/dataplane/values.azure.yaml).
#
# Subsumes dataplane.azure-custom-storage-prefix.yaml (custom prefix below).

global:
  UNION_CONTROL_PLANE_HOST: "test.dataplane.union.ai"
  CLUSTER_NAME: "test-azure-cluster"
  ORG_NAME: "test-org"
  AUTH_CLIENT_ID: "test-client-id"
  METADATA_CONTAINER: "test-metadata-container"
  AZURE_STORAGE_ACCOUNT: "teststorageaccount"
  AZURE_SUBSCRIPTION_ID: "test-subscription-id"
  AZURE_TENANT_ID: "test-tenant-id"
  AZURE_RESOURCE_GROUP: "test-resource-group"
  AZURE_BACKEND_CLIENT_ID: "test-backend-client-id"
  AZURE_WORKER_CLIENT_ID: "test-worker-client-id"
  AZURE_KEY_VAULT_URI: "https://test-keyvault.vault.azure.net/"

secrets:
  admin:
    create: true
    clientSecret: "test-client-secret-value"

# Subsumes dataplane.azure-custom-storage-prefix.yaml: confirm
# storage.metadataPrefix overrides the auto-generated abfs:// prefix.
storage:
  metadataPrefix: "abfs://custom-prefix@teststorageaccount.dfs.core.windows.net"
