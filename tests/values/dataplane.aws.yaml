# helm-values: values.aws.yaml,examples/values-test-certs.yaml
# Exercises the AWS sibling overlay (charts/dataplane/values.aws.yaml) by
# layering it and filling only the placeholders the overlay leaves empty.
#
# Subsumes the following dropped fixtures:
#   - dataplane.aws.with-ingress.yaml   (ingress.enabled toggled below)
#   - dataplane.additional-templates.yaml
#   - dataplane.clusterresourcesync.yaml (default rules covered by the overlay)
#   - dataplane.cost.yaml
#   - dataplane.dcgm-exporter.yaml      (overlay already enables it)
#   - dataplane.monitoring.yaml
#
# Not subsumed (deliberately kept standalone):
#   - dataplane.additional-podlabels.yaml + dataplane.nodeobserver.yaml are
#     mutually exclusive in this snapshot until the nodeobserver daemonset
#     template stops concatenating additionalPodLabels with the labels block
#     (`custom-label: valueapp.kubernetes.io/name:` — invalid YAML).

global:
  UNION_CONTROL_PLANE_HOST: "test-controlplane-host"
  CLUSTER_NAME: "test-cluster-name"
  ORG_NAME: "test-org-name"
  METADATA_BUCKET: "test-metadata-bucket"
  FAST_REGISTRATION_BUCKET: "test-fast-registration-bucket"
  AWS_ACCOUNT_ID: "123456789012"
  AWS_REGION: "us-east-2"
  BACKEND_IAM_ROLE_ARN: "arn:aws:iam::123456789012:role/test-backend"
  WORKER_IAM_ROLE_ARN: "arn:aws:iam::123456789012:role/test-worker"
  CONTROLPLANE_HOST: "test-controlplane-host"
  AUTH_CLIENT_ID: "test-client-id"

# namespace_mapping cascading to all services.
namespace_mapping:
  template: '{{`{{ project }}`}}-{{`{{ domain }}`}}'

# clusterresourcesync additionalTemplates — subsumes the standalone
# additional-templates fixture; locks in default ClusterRole rules.
clusterresourcesync:
  additionalTemplates:
    - key: d_custom_networkpolicy
      value: |
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: default-deny
          namespace: {{ namespace }}
        spec:
          podSelector: {}
          policyTypes:
          - Ingress

additionalPodAnnotations:
  prometheus.io/scrape: "true"

secrets:
  admin:
    create: true
    clientSecret: "test-not-real-secret"

# Subsumes dataplane.aws.with-ingress.yaml.
ingress:
  enabled: true

# Subsumes dataplane.cost.yaml.
cost:
  enabled: true
  serviceMonitor:
    matchLabels:
      release: monitoring

# Subsumes dataplane.monitoring.yaml.
monitoring:
  enabled: true
  alerting:
    enabled: true
