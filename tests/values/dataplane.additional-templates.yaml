# Test that additionalTemplates are rendered alongside the default templates
# without overwriting the namespace, service account, or resource quota templates.
namespace_mapping:
  template: '{{`{{ project }}`}}-{{`{{ domain }}`}}'

host: test.example.com

secrets:
  admin:
    clientId: test-client-id
    clientSecret: test-client-secret

clusterresourcesync:
  additionalTemplates:
    - key: d_custom_networkpolicy
      value: |
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: default-deny
          namespace: {{ namespace }}
        spec:
          podSelector: {}
          policyTypes:
          - Ingress
    - key: e_custom_limitrange
      value: |
        apiVersion: v1
        kind: LimitRange
        metadata:
          name: default-limits
          namespace: {{ namespace }}
        spec:
          limits:
          - default:
              cpu: "2"
              memory: "1Gi"
            type: Container
