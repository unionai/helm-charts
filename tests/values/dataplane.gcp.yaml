# helm-values: values-test-certs.yaml
host: byok.us-west-2.union.ai
clusterName: test-e2e-gcp
orgName: byok
provider: gcp
storage:
  provider: gcs
  bucketName: test-gcp-bucket
  fastRegistrationBucketName: test-gcp-bucket
  region: us-central1
  enableMultiContainer: true
  gcp:
    projectId: test-gcp-project-123
secrets:
  admin:
    create: true
    clientId: byok-test-e2e-gcp-operator
    clientSecret: test-not-real-secret
additionalServiceAccountAnnotations:
  iam.gke.io/gcp-service-account: 'union-backend@test-gcp-project-123.iam.gserviceaccount.com'
userRoleAnnotationKey: iam.gke.io/gcp-service-account
userRoleAnnotationValue: union-worker@test-gcp-project-123.iam.gserviceaccount.com
fluentbit:
  serviceAccount:
    annotations:
      iam.gke.io/gcp-service-account: union-backend@test-gcp-project-123.iam.gserviceaccount.com
