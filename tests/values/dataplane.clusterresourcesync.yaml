# helm-values: values-test-certs.yaml

# Exercises the clusterresourcesync ClusterRole template, which is only rendered
# when namespaces.enabled=true and low_privilege=false (i.e. not singleNamespace
# mode). Locks in the default clusterRoleRules (including limitranges) and
# verifies that custom rules render through to the union-clustersync-resource
# ClusterRole.
host: test.example.com

low_privilege: false

namespaces:
  enabled: true

secrets:
  admin:
    clientId: test-client-id
    clientSecret: test-client-secret

clusterresourcesync:
  enabled: true
  config:
    union:
      auth:
        enable: false
  clusterRoleRules:
    - apiGroups:
        - ""
        - rbac.authorization.k8s.io
      resources:
        - clusterrolebindings
        - configmaps
        - limitranges
        - namespaces
        - podtemplates
        - pods
        - resourcequotas
        - rolebindings
        - roles
        - secrets
        - serviceaccounts
        - services
      verbs:
        - '*'
    - apiGroups:
        - example.com
      resources:
        - widgets
      verbs:
        - get
        - list
        - watch
