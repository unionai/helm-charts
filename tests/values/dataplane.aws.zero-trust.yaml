# helm-values: values-test-certs.yaml,values.aws.yaml,values.zero-trust.yaml
# Zero-trust BYOC AWS render. One platform is enough — values.zero-trust.yaml
# is cloud-agnostic and the per-cloud platform deltas are already covered by
# the existing dataplane.{aws,azure,gcp}.yaml snapshots.

global:
  UNION_CONTROL_PLANE_HOST: "test-controlplane-host"
  CLUSTER_NAME: "test-cluster-name"
  ORG_NAME: "test-org-name"
  CLIENT_ID: "test-client-id"
  METADATA_BUCKET: "test-metadata-bucket"
  FAST_REGISTRATION_BUCKET: "test-fast-registration-bucket"
  AWS_ACCOUNT_ID: "123456789012"
  AWS_REGION: "test-region"
  BACKEND_IAM_ROLE_ARN: "test-backend-iam-role-arn"
  WORKER_IAM_ROLE_ARN: "test-worker-iam-role-arn"

# Workaround for a pre-existing chart bug: values.aws.yaml's task_logs plugin
# defaults reference .Values.storage.s3.region and .Values.storage.type, but
# neither is defined in values.yaml or values.aws.yaml. Real BYOC deployments
# get these from the cloud repo's environment-specific overlay; supply them
# inline here so the snapshot can render. Track removing this once the
# upstream values.aws.yaml is fixed to reference .Values.storage.region.
storage:
  type: "s3"
  s3:
    region: "test-region"

secrets:
  admin:
    clientSecret: "test-not-real-secret"
