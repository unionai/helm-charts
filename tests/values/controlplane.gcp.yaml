# helm-values: values.gcp.yaml
# Exercises the GCP sibling overlay (charts/controlplane/values.gcp.yaml).
# The CP test suite previously had no GCP coverage — values.gcp.yaml's tpl
# expansions of GCP_REGION, GOOGLE_PROJECT_ID, etc. were untested.

global:
  UNION_HOST: "test.example.com"
  UNION_ORG: "test-org"
  GCP_REGION: "us-central1"
  GOOGLE_PROJECT_ID: "test-project"
  DB_HOST: "10.0.0.1"
  DB_NAME: "dbName"
  DB_USER: "dbUser"
  BUCKET_NAME: "bucketName"
  ARTIFACTS_BUCKET_NAME: "artifactsBucketName"
  # KUBERNETES_SECRET_NAME omitted -- see controlplane.aws.yaml for context
  # on the unionai.secretName tpl helper bug.
  DATAPLANE_HOST: "http://dataplane-nginx-controller.dataplane.svc.cluster.local:80"
  ARTIFACT_IAM_ROLE_ARN: "artifacts@test-project.iam.gserviceaccount.com"
  FLYTEADMIN_IAM_ROLE_ARN: "adminflyte@test-project.iam.gserviceaccount.com"
  INTERNAL_CLIENT_ID: "test-internal-client-id"
  AUTH_TOKEN_URL: "https://test.example.com/oauth2/v1/token"

dbPass: "dbPass"

configMap:
  connection:
    environment: staging
    rootTenantURLPattern: dns:///fake-host.domain

controlplane:
  enabled: true

ingress:
  host: fake-host.domain
  tls:
    - hosts:
        - fake-host.domain
      secretName: fake-host-tls-secret

flyte:
  common:
    ingress:
      tls:
        secretName: fake-host-tls-secret
      host: fake-host.domain
  configmap:
    admin:
      admin:
        endpoint: dns:///fake-host.domain
        insecure: false
