apiVersion: v1
kind: ConfigMap
metadata:
  name: flyte-propeller-config
  namespace: union
data:
  admin.yaml: | 
    admin:
      clientId: 'dataplane-operator'
      clientSecretLocation: /etc/union/secret/client_secret
      endpoint: dns:///
      insecure: false
    event:
      capacity: 1000
      rate: 500
      type: admin
  catalog.yaml: | 
    catalog-cache:
      cache-endpoint: dns:///
      endpoint: dns:///
      insecure: false
      type: fallback
      use-admin-auth: true
