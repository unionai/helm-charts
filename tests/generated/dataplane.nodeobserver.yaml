        - defaultUserRoleKey:
            value: 'eks.amazonaws.com/role-arn'
        - defaultUserRoleValue:
            value: 'arn:aws:iam::ACCOUNT_ID:role/flyte_project_role'
      - development:
        - projectQuotaCpu:
            value: "4096"
        - projectQuotaMemory:
            value: 2Ti
        - projectQuotaNvidiaGpu:
            value: "256"
        - defaultUserRoleKey:
            value: 'eks.amazonaws.com/role-arn'
        - defaultUserRoleValue:
