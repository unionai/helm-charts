# Source: dataplane/templates/nodeexecutor/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: executor
  namespace: union
  labels:
    app: executor
data:
  task_logs.yaml: | 
    plugins:
      logs:
        cloudwatch-enabled: false
        dynamic-log-links:
        - vscode:
            displayName: VS Code Debugger
            linkType: ide
            templateUris:
            - /dataplane/pod/v1/generated_name/6060/task/{{.executionProject}}/{{.executionDomain}}/{{.executionName}}/{{.nodeID}}/{{.taskRetryAttempt}}/{{ .Values.global.CLUSTER_NAME }}/{{.namespace}}/{{.taskProject}}/{{.taskDomain}}/{{.taskID}}/{{.taskVersion}}/{{.generatedName}}/
        - wandb-execution-id:
            displayName: Weights & Biases
            linkType: dashboard
            templateUris:
            - '{{ .taskConfig.host }}/{{ .taskConfig.entity }}/{{ .taskConfig.project
              }}/runs/{{ .podName }}'
        - wandb-custom-id:
            displayName: Weights & Biases
            linkType: dashboard
            templateUris:
            - '{{ .taskConfig.host }}/{{ .taskConfig.entity }}/{{ .taskConfig.project
              }}/runs/{{ .taskConfig.id }}'
        - comet-ml-execution-id:
            displayName: Comet
            linkType: dashboard
            templateUris: '{{ .taskConfig.host }}/{{ .taskConfig.workspace }}/{{
              .taskConfig.project_name }}/{{ .executionName }}{{ .nodeId }}{{
              .taskRetryAttempt }}{{ .taskConfig.link_suffix }}'
        - comet-ml-custom-id:
            displayName: Comet
            linkType: dashboard
            templateUris: '{{ .taskConfig.host }}/{{ .taskConfig.workspace }}/{{
              .taskConfig.project_name }}/{{ .taskConfig.experiment_key }}'
        - neptune-scale-run:
            displayName: Neptune Run
            linkType: dashboard
            templateUris:
            - https://scale.neptune.ai/{{ .taskConfig.project }}/-/run/?customId={{
              .podName }}
        - neptune-scale-custom-id:
            displayName: Neptune Run
            linkType: dashboard
            templateUris:
            - https://scale.neptune.ai/{{ .taskConfig.project }}/-/run/?customId={{
              .taskConfig.id }}
        kubernetes-enabled: false
  enabled_plugins.yaml: |
    plugins:
      connector-service:
        defaultConnector:
          defaultServiceConfig: '{"loadBalancingConfig": [{"round_robin":{}}]}'
          endpoint: k8s:///flyteconnector.union:8000
    tasks:
      task-plugins:
        default-for-task-types:
          actor: fast-task
          container: container
          container_array: k8s-array
          sidecar: sidecar
        enabled-plugins:
        - container
        - sidecar
        - k8s-array
        - echo
        - fast-task
        - connector-service
  config.yaml: |
    executor:
      cluster: 'test-azure-cluster'
      evaluatorCount: 64
      maxActions: 2000
      organization: 'test-org'
      unionAuth:
        injectSecret: true
        secretName: EAGER_API_KEY
      workerName: worker1
      task_resources:
        defaults:
          cpu: 100m
          memory: 500Mi
        limits:
          cpu: 4096
          gpu: 256
          memory: 2Ti
    namespace_mapping:
      template: union
    union:
      connection:
        host: dns:///test.dataplane.union.ai
      auth:
        authorizationMetadataKey: flyte-authorization
        clientId: 'test-client-id'
        clientSecretLocation: /etc/union/secret/client_secret
        tokenRefreshWindow: 5m
        type: ClientSecret
    admin:
      clientId: 'test-client-id'
      clientSecretLocation: /etc/union/secret/client_secret
      endpoint: dns:///test.dataplane.union.ai
      insecure: false
    authorizer:
      type: noop
    catalog-cache:
      cache-endpoint: dns:///test.dataplane.union.ai
      endpoint: dns:///test.dataplane.union.ai
      insecure: false
      type: cacheservicev2
      use-admin-auth: true
    logger:
      formatter:
        type: json
      level: 4
      show-source: true
    namespace_mapping:
      template: '{{ domain }}'
    sharedService:
      metrics:
        scope: 'executor:'
      security:
        allowCors: true
        allowLocalhostAccess: true
        allowedHeaders:
        - Content-Type
        allowedOrigins:
        - '*'
        secure: false
        useAuth: false
    propeller:
      limit-namespace: union
      node-config:
        disable-input-file-writes: true
    plugins:
      fasttask:
        additional-worker-args:
        - --last-ack-grace-period-seconds
        - "120"
        callback-uri: http://union-operator-executor.union.svc.cluster.local:15605
        grace-period-status-not-found: 2m
      ioutils:
        remoteFileOutputPaths:
          deckFilename: report.html
      k8s:
        disable-inject-owner-references: true
        default-cpus: 100m
        default-env-vars:
        - AZURE_STORAGE_ACCOUNT_NAME: test-storage-account
        default-labels:
        - azure.workload.identity/use: "true"
        default-memory: 100Mi
        default-pod-template-name: task-template
        interruptible-node-selector-requirement:
          key: kubernetes.azure.com/scalesetpriority
          operator: In
          values:
          - spot
        interruptible-tolerations:
        - effect: NoSchedule
          key: kubernetes.azure.com/scalesetpriority
          operator: Equal
          value: spot
        non-interruptible-node-selector-requirement:
          key: kubernetes.azure.com/scalesetpriority
          operator: DoesNotExist
        co-pilot:
          image: 'cr.flyte.org/flyteorg/flytecopilot:v1.14.1'
          name: flyte-copilot-
          start-timeout: 30s
    storage:
      container: ""
      container: 'test-metadata-container'
      stow:
        config:
          account: 'test-storage-account'
        kind: azure
      type: stow
      enable-multicontainer: true
      limits:
        maxDownloadMBs: 1024
      cache:
        max_size_mbs: 0
        target_gc_percent: 70
