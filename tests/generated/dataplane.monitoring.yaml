# Source: dataplane/templates/serving/bootstrap-configmap.yaml
# We need to copy the default configmap here since knative-operator does not automatically update the
# address of the `net-kourier-controller` endpoint to use the release namespace. It assumes that the
# resources are being installed into the `knative-serving` namespace instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: union-operator-serving-envoy-bootstrap
  namespace: union
data:
  envoy-bootstrap.yaml: |
    dynamic_resources:
      ads_config:
        transport_api_version: V3
        api_type: GRPC
        rate_limit_settings: {}
        grpc_services:
        - envoy_grpc: {cluster_name: xds_cluster}
      cds_config:
        resource_api_version: V3
        ads: {}
      lds_config:
        resource_api_version: V3
        ads: {}
    node:
      cluster: kourier-knative
      id: 3scale-kourier-gateway
    static_resources:
      listeners:
        - name: stats_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 9000
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: stats_server
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      virtual_hosts:
                        - name: admin_interface
                          domains:
                            - "*"
                          routes:
                            - match:
                                safe_regex:
                                  regex: '/(certs|stats(/prometheus)?|server_info|clusters|listeners|ready)?'
                                headers:
                                  - name: ':method'
                                    string_match:
                                      exact: GET
                              route:
                                cluster: service_stats
                            - match:
                                safe_regex:
                                  regex: '/drain_listeners'
                                headers:
                                  - name: ':method'
                                    string_match:
                                      exact: POST
                              route:
                                cluster: service_stats
      clusters:
        - name: service_stats
          connect_timeout: 0.250s
          type: static
          load_assignment:
            cluster_name: service_stats
            endpoints:
              lb_endpoints:
                endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 9901
        - name: xds_cluster
          # This keepalive is recommended by envoy docs.
          # https://www.envoyproxy.io/docs/envoy/latest/api-docs/xds_protocol
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options:
                  connection_keepalive:
                    interval: 30s
                    timeout: 5s
          connect_timeout: 1s
          load_assignment:
            cluster_name: xds_cluster
            endpoints:
              lb_endpoints:
                endpoint:
                  address:
                    socket_address:
                      address: "net-kourier-controller"
                      port_value: 18000
          type: STRICT_DNS
    admin:
      access_log:
      - name: envoy.access_loggers.stdout
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    stats_config:
      stats_tags:
        - tag_name: name
          regex: '^.*?\.u/.*?n=(.*?)/.*?u\..*$'
        - tag_name: domain
          regex: '^.*?\.u/.*?d=(.*?)/.*?u\..*$'
        - tag_name: org
          regex: '^.*?\.u/.*?o=(.*?)/.*?u\..*$'
        - tag_name: project
          regex: '^.*?\.u/.*?p=(.*?)/.*?u\..*$'
        - tag_name: target
          regex: '^.*?\.u/.*?t=(.*?)/.*?u\..*$'
        - tag_name: target_namespace
          regex: '^.*?\.u/.*?tns=(.*?)/.*?u\..*$'
