  labels:
    helm.sh/chart: knative-migration-2026.5.0
    app.kubernetes.io/name: knative-migration
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
