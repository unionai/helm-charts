apiVersion: apps/v1
kind: Deployment
metadata:
  name: flyteadmin
  namespace: union
  labels: 
    app.kubernetes.io/name: flyteadmin
    app.kubernetes.io/instance: release-name
    helm.sh/chart: flyte-v1.16.1
    #app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels: 
      app.kubernetes.io/name: flyteadmin
      app.kubernetes.io/instance: release-name
  strategy: 
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      annotations:
        configChecksum: "3a00ceff1f54edcec0a2092a580a6c8bc4d380283641fa53f9dced3264ba98d"
        kubectl.kubernetes.io/default-container: flyteadmin
      labels: 
        app.kubernetes.io/name: flyteadmin
        app.kubernetes.io/instance: release-name
        helm.sh/chart: flyte-v1.16.1
        #app.kubernetes.io/managed-by: Helm
    spec:
      securityContext: 
        fsGroup: 65534
        fsGroupChangePolicy: Always
        runAsNonRoot: true
        runAsUser: 1001
        seLinuxOptions:
          type: spc_t
      initContainers:
        - command:
          - flyteadmin
          - --config
          - /etc/flyte/config/*.yaml
          - migrate
          - run
          image: "643379628101.dkr.ecr.us-east-1.amazonaws.com/union-cp/services:"
          imagePullPolicy: "IfNotPresent"
          name: run-migrations
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
          - mountPath: /etc/db
            name: union-controlplane-secrets
          - mountPath: /etc/flyte/config
            name: base-config-volume
        - command:
          - flyteadmin
          - --config
          - /etc/flyte/config/*.yaml
          - migrate
          - seed-projects
          - union-health-monitoring
          - flytesnacks
          image: "643379628101.dkr.ecr.us-east-1.amazonaws.com/union-cp/services:"
          imagePullPolicy: "IfNotPresent"
          name: seed-projects
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
          - mountPath: /etc/db
            name: union-controlplane-secrets
          - mountPath: /etc/flyte/config
            name: base-config-volume
        - name: generate-secrets
          image: "643379628101.dkr.ecr.us-east-1.amazonaws.com/union-cp/services:"
          imagePullPolicy: "IfNotPresent"
          command: ["/bin/sh", "-c"]
          args:
            [
                "flyteadmin --config=/etc/flyte/config/*.yaml secrets init --localPath /etc/scratch/secrets && flyteadmin --config=/etc/flyte/config/*.yaml secrets create --name flyte-admin-secrets --fromPath /etc/scratch/secrets",
            ]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - mountPath: /etc/flyte/config
              name: base-config-volume
            - mountPath: /etc/scratch
              name: scratch
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
      containers:
      - command:
        - flyteadmin
        - --config
        - /etc/flyte/config/*.yaml
        - serve
        image: "643379628101.dkr.ecr.us-east-1.amazonaws.com/union-cp/services:"
        imagePullPolicy: "IfNotPresent"
        name: flyteadmin
        ports:
        - containerPort: 8088
        - containerPort: 8089
        - containerPort: 10254
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 8088
          initialDelaySeconds: 15
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 8088
          initialDelaySeconds: 20
          timeoutSeconds: 1
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        resources:
          limits:
            cpu: 2
            ephemeral-storage: 500Mi
            memory: 3Gi
          requests:
            cpu: 50m
            ephemeral-storage: 200Mi
            memory: 500Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - mountPath: /etc/db
          name: union-controlplane-secrets
        - mountPath: /srv/flyte
          name: shared-data
        - mountPath: /etc/flyte/config
          name: clusters-config-volume
        - mountPath: /etc/secrets/
          name: admin-secrets
        - mountPath: /etc/secrets/union
          name: union-secrets
          readOnly: true
      serviceAccountName: flyteadmin
      volumes:
      - name: union-controlplane-secrets
        secret:
          secretName: union-controlplane-secrets
      - emptyDir: {}
        name: shared-data
      - emptyDir: {}
        name: scratch
      - projected:
          sources:
            - configMap:
                name: flyte-admin-base-config
        name: base-config-volume
      - projected:
          sources:
            - configMap:
                name: flyte-admin-base-config
            - configMap:
                name: flyte-admin-clusters-config
        name: clusters-config-volume
      - name: admin-secrets
        secret:
          secretName: flyte-admin-secrets
      - name: union-secrets
        secret:
          secretName: ''
