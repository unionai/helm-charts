apiVersion: v1
kind: ConfigMap
metadata:
  name: flyte-admin-base-config
  namespace: union
  labels: 
    app.kubernetes.io/name: flyteadmin
    app.kubernetes.io/instance: release-name
    helm.sh/chart: flyte-v1.16.1
    #app.kubernetes.io/managed-by: Helm
data:
  db.yaml: | 
    database:
      connMaxLifeTime: 120s
      dbname: flyteadmin
      host: ''
      maxIdleConnections: 10
      maxOpenConnections: 80
      passwordPath: /etc/db/pass.txt
      port: 5432
      username: ''
  domain.yaml: | 
    domains:
    - id: development
      name: development
    - id: staging
      name: staging
    - id: production
      name: production
  otel.yaml: | 
    otel:
      file:
        filename: /tmp/trace.txt
      jaeger:
        endpoint: http://localhost:14268/api/traces
      otlpgrpc:
        endpoint: http://localhost:4317
      otlphttp:
        endpoint: http://localhost:4318/v1/traces
      sampler:
        parentSampler: always
      type: noop
  server.yaml: | 
    admin:
      endpoint: dns:///
      insecure: false
    auth:
      appAuth:
        thirdPartyConfig:
          flyteClient:
            clientId: flytectl
            redirectUri: http://localhost:53593/callback
            scopes:
            - offline
            - all
      authorizedUris:
      - https://localhost:30081
      - http://flyteadmin:80
      - http://flyteadmin.flyte.svc.cluster.local:80
      userAuth:
        openId:
          baseUrl: https://accounts.google.com
          clientId: 657465813211-6eog7ek7li5k7i7fvgv2921075063hpe.apps.googleusercontent.com
          scopes:
          - profile
          - openid
    authorizer:
      authorizerClient:
        forwardHeaders:
        - authorization
        - flyte-authorization
        - x-user-token
        grpcConfig:
          host: dns:///authorizer.union.svc.cluster.local:80
          insecure: true
      type: Authorizer
      useExternalIdentity: 'false'
    cloudEvents:
      enable: false
    connection:
      environment: staging
      region: ''
      rootTenantURLPattern: dns:///
    flyteadmin:
      eventVersion: 2
      metadataStoragePrefix:
      - metadata
      - admin
      metricsKeys:
      - phase
      metricsScope: 'flyte:'
      profilerPort: 10254
      roleNameKey: iam.amazonaws.com/role
      useOffloadedInputs: true
      useOffloadedWorkflowClosure: true
    otel:
      type: noop
    private:
      app:
        cacheProviderConfig:
          kind: bypass
        populateUserFields: false
    server:
      grpc:
        port: 8089
      httpPort: 8088
      security:
        allowCors: true
        allowedHeaders:
        - Content-Type
        - flyte-authorization
        allowedOrigins:
        - '*'
        secure: false
        useAuth: false
    sharedService:
      connectPort: 8089
      httpPort: 8088
      port: 8089
      selfServeConfig:
        legacyHosts:
        - ''
    union:
      internalConnectionConfig:
        enabled: true
        urlPattern: '_SERVICE_.union.svc.cluster.local:80'
  remoteData.yaml: | 
    remoteData:
      region: us-east-1
      scheme: local
      signedUrls:
        durationMinutes: 3
  storage.yaml: | 
    storage:
      type: s3
      container: ""
      connection:
        auth-type: iam
        region: 
      enable-multicontainer: false
      limits:
        maxDownloadMBs: 10
      cache:
        max_size_mbs: 1024
        target_gc_percent: 70
  task_resource_defaults.yaml: | 
    task_resources:
      defaults:
        cpu: 100m
        memory: 500Mi
      limits:
        cpu: 2
        gpu: 1
        memory: 1Gi
