              "description": "Task completion rate by outcome: succeeded, failed, aborted. Key V2 SLI for task health. [Metrics pending: requires cloud service instrumentation to be deployed]",
              "options": {
                "legend": {
                  "displayMode": "table",
                  "placement": "bottom",
                  "calcs": [
                    "min",
                    "max",
                    "lastNotNull"
