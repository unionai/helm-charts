    - job_name: 'opencost'
      metrics_path: /metrics
      scrape_interval: 1m
      honor_labels: true
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            own_namespace: true
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
