# Source: dataplane/templates/nodeexecutor/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: executor
  namespace: union
  labels:
    app: executor
data:
  task_logs.yaml: | 
    plugins:
      dask:
        logs:
          cloudwatch-enabled: false
          dynamic-log-links:
          - vscode:
              displayName: VSCode
              linkType: ide
              templateUris:
              - /dataplane/pod/v1/generated_name/6060/task/{{.executionProject}}/{{.executionDomain}}/{{.executionName}}/{{.nodeID}}/{{.taskRetryAttempt}}/{{ .Values.global.CLUSTER_NAME }}/{{.namespace}}/{{.taskProject}}/{{.taskDomain}}/{{.taskID}}/{{.taskVersion}}/{{.podName}}/
          kubernetes-enabled: false
          templates:
          - displayName: Cloudwatch Logs
