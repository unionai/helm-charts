        - action: labeldrop
          regex: "label_(feature_node_kubernetes_io_.+|kubernetes_azure_com_.+|karpenter_k8s_aws_.+|nvidia_com_gfd_timestamp)"
    - job_name: 'union-services'
      metrics_path: /metrics
      scrape_interval: 1m
      honor_labels: true
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            own_namespace: true
