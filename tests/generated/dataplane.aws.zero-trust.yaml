# Source: dataplane/templates/gateway/bootstrap-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: union-operator-gateway-envoy-bootstrap
  namespace: union
  labels:
    helm.sh/chart: dataplane-2026.5.2
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: knative-serving
    app.kubernetes.io/version: "1.16.0"
    networking.knative.dev/ingress-provider: kourier
data:
  envoy-bootstrap.yaml: |
    dynamic_resources:
      ads_config:
        transport_api_version: V3
        api_type: GRPC
        rate_limit_settings: {}
        grpc_services:
        - envoy_grpc:
            cluster_name: xds_cluster
      cds_config:
        resource_api_version: V3
        ads: {}
      lds_config:
        resource_api_version: V3
        ads: {}
    node:
      cluster: kourier-knative
      id: 3scale-kourier-gateway
    static_resources:
      listeners:
        - name: stats_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 9000
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: stats_server
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      virtual_hosts:
                        - name: admin_interface
                          domains:
                            - "*"
                          routes:
                            - match:
                                safe_regex:
                                  regex: /stats(/prometheus)?
                              route:
                                cluster: service_stats
                            - match:
                                prefix: /
                              direct_response:
                                status: 404
        - name: dataplane_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8888
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: dataplane
                    # === Trust boundary: treat this listener as the edge ===
                    # The dataplane is reachable via two paths, both with RFC1918 peers:
                    #   1. Cloudflare -> cloudflared sidecar -> Envoy
                    #      cloudflared forwards Cloudflare's XFF and cf-connecting-ip;
                    #      it is a trusted intermediary.
                    #   2. VPN -> internal L4 LB -> Envoy
                    #      Cloud internal TCP LBs (AWS NLB, GCP/Azure ILBs) are TCP
                    #      pass-through -- no HTTP-aware hop, so XFF on this path is
                    #      whatever the VPN client sent, including forgeries.
                    # Envoy's default RFC1918-as-internal rule would trust attacker-
                    # controllable x-request-id and x-envoy-* headers on path 2. We
                    # force edge semantics:
                    #
                    #   - internal_address_config empty -> no peer is "internal", so
                    #     Envoy regenerates x-request-id and strips x-envoy-* upstream.
                    #   - use_remote_address: true       -> trust the immediate peer.
                    #   - xff_num_trusted_hops: 0        -> both paths share this
                    #     listener; trusting >0 hops would correctly attribute path 1
                    #     but let path 2 clients spoof their source IP via forged XFF.
                    #
                    # Caveats: client-supplied x-forwarded-for is *not* stripped (the
                    # inbound XFF chain still flows upstream). The real client IP on
                    # path 1 lives in cf-connecting-ip, but union-authn (enabled by
                    # default) strips the cf-* family before upstream, so when union-
                    # authn is on there is no upstream-visible real-client-IP today.
                    use_remote_address: true
                    xff_num_trusted_hops: 0
                    internal_address_config:
                      cidr_ranges: []
                    # Always echo Envoy's generated x-request-id back so browser/Connect-Web
                    # clients can read it from the response for log correlation.
                    always_set_request_id_in_response: true
                    http_filters:
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      - name: envoy.filters.http.golang
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.golang.v3alpha.Config
                          library_id: union-authn
                          library_path: /lib/union-authn.so
                          plugin_name: union-authn
                          plugin_config:
                            "@type": type.googleapis.com/xds.type.v3.TypedStruct
                            value:
                              enabled: true
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      virtual_hosts:
                        - name: dataplane
                          typed_per_filter_config:
                            envoy.filters.http.cors:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                              allow_origin_string_match:
                                - exact: "https://test-controlplane-host"
                              allow_methods: "GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS"
                              allow_headers: "DNT, Keep-Alive, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range, Authorization, Connect-Protocol-Version, Connect-Timeout-Ms, Grpc-Timeout, X-Grpc-Web, X-User-Agent"
                              expose_headers: "Grpc-Status, Grpc-Message, Grpc-Status-Details-Bin, x-request-id"
                              allow_credentials: true
                              forward_not_matching_preflights: false
                              max_age: "86400"
                          domains:
                            - "test-cluster-name.dp.test-controlplane-host"
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: dataproxy
                                timeout: 3600s
                            - match:
                                prefix: "/"
                              direct_response:
                                status: 404
      clusters:
        - name: service_stats
          connect_timeout: 0.250s
          type: STATIC
          load_assignment:
            cluster_name: service_stats
            endpoints:
              lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: 127.0.0.1
                        port_value: 9901
        - name: xds_cluster
          connect_timeout: 1s
          type: STRICT_DNS
          load_assignment:
            cluster_name: xds_cluster
            endpoints:
              lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: net-kourier-controller
                        port_value: 18000
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options:
                  connection_keepalive:
                    interval: 30s
                    timeout: 5s
        - name: dataproxy
          connect_timeout: 0.25s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: dataproxy
            endpoints:
              lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: union-operator-dataproxy
                        port_value: 8080
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
    stats_config:
      stats_tags:
        - tag_name: name
          regex: '^.*?\.u/.*?n=(.*?)/.*?u\..*$'
        - tag_name: domain
          regex: '^.*?\.u/.*?d=(.*?)/.*?u\..*$'
        - tag_name: org
          regex: '^.*?\.u/.*?o=(.*?)/.*?u\..*$'
        - tag_name: project
          regex: '^.*?\.u/.*?p=(.*?)/.*?u\..*$'
        - tag_name: target
          regex: '^.*?\.u/.*?t=(.*?)/.*?u\..*$'
        - tag_name: target_namespace
          regex: '^.*?\.u/.*?tns=(.*?)/.*?u\..*$'
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
---
