apiVersion: batch/v1
kind: Job
metadata:
  name: flyte-webhook-cleanup
  namespace: union
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
