                  description: TrafficTarget holds a single entry of the routing table for a Route.
                  properties:
                    configurationName:
                      description: 'ConfigurationName of a configuration to whose latest revision we will send

                        this portion of traffic. When the "status.latestReadyRevisionName" of the

                        referenced configuration changes, we will automatically migrate traffic

                        from the prior "latest ready" revision to the new one.  This field is never

                        set in Route''s status, only its spec.  This is mutually exclusive with

                        RevisionName.'
                      type: string
                    latestRevision:
                      description: 'LatestRevision may be optionally provided to indicate that the latest

