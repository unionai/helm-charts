apiVersion: v1
kind: ConfigMap
metadata:
  name: leaseworker
  namespace: union
  labels:
    app: leaseworker
data:
  task_logs.yaml: | 
    plugins:
      logs:
        cloudwatch-enabled: false
        dynamic-log-links:
        - vscode:
            displayName: VS Code Debugger
            linkType: ide
            templateUris:
            - /dataplane/pod/v1/generated_name/6060/task/{{.executionProject}}/{{.executionDomain}}/{{.executionName}}/{{.nodeID}}/{{.taskRetryAttempt}}/{{ .Values.global.CLUSTER_NAME }}/{{.namespace}}/{{.taskProject}}/{{.taskDomain}}/{{.taskID}}/{{.taskVersion}}/{{.generatedName}}/
        - wandb-execution-id:
            displayName: Weights & Biases
            linkType: dashboard
            templateUris:
            - '{{ .taskConfig.host }}/{{ .taskConfig.entity }}/{{ .taskConfig.project
              }}/runs/{{ .podName }}'
        - wandb-custom-id:
            displayName: Weights & Biases
            linkType: dashboard
            templateUris:
            - '{{ .taskConfig.host }}/{{ .taskConfig.entity }}/{{ .taskConfig.project
              }}/runs/{{ .taskConfig.id }}'
        - comet-ml-execution-id:
            displayName: Comet
            linkType: dashboard
            templateUris: '{{ .taskConfig.host }}/{{ .taskConfig.workspace }}/{{
              .taskConfig.project_name }}/{{ .executionName }}{{ .nodeId }}{{
              .taskRetryAttempt }}{{ .taskConfig.link_suffix }}'
        - comet-ml-custom-id:
            displayName: Comet
            linkType: dashboard
            templateUris: '{{ .taskConfig.host }}/{{ .taskConfig.workspace }}/{{
              .taskConfig.project_name }}/{{ .taskConfig.experiment_key }}'
        - neptune-scale-run:
            displayName: Neptune Run
            linkType: dashboard
            templateUris:
            - https://scale.neptune.ai/{{ .taskConfig.project }}/-/run/?customId={{
              .podName }}
        - neptune-scale-custom-id:
            displayName: Neptune Run
            linkType: dashboard
            templateUris:
            - https://scale.neptune.ai/{{ .taskConfig.project }}/-/run/?customId={{
              .taskConfig.id }}
        kubernetes-enabled: false
  webhook.yaml: |

    
    propeller:
      limit-namespace: union
    webhook:
      certDir: /etc/webhook/certs
      disableCreateMutatingWebhookConfig: true
      embeddedSecretManagerConfig:
        imagePullSecrets:
          enabled: true
        k8sConfig:
          namespace: 'union'
        type: 'K8s'
      listenPort: '9443'
      localCert: true
      secretManagerTypes:
      - Embedded
      - K8s
      secretName: union-pod-webhook
      serviceName: union-pod-webhook
      servicePort: '443'
  enabled_plugins.yaml: |
    plugins:
      connector-service:
        defaultConnector:
          defaultServiceConfig: '{"loadBalancingConfig": [{"round_robin":{}}]}'
          endpoint: k8s:///flyteconnector.union:8000
    tasks:
      task-plugins:
        default-for-task-types:
          actor: fast-task
          container: container
          container_array: k8s-array
          sidecar: sidecar
        enabled-plugins:
        - container
        - sidecar
        - k8s-array
        - echo
        - fast-task
        - connector-service
  config.yaml: |
    leaseworker:
      capacity: 100000
      cluster: 'test-cluster-name'
      dispatcherCount: 512
      limit-namespace: union
      namespace-template: union
      organization: 'test-org-name'
      refreshInterval: 10s
      task_resources:
        defaults:
          cpu: 100m
          memory: 500Mi
        limits:
          cpu: 4096
          gpu: 256
          memory: 2Ti
      unionAuth:
        injectSecret: true
        secretName: EAGER_API_KEY
      workerName: 'test-org-name-test-cluster-name-worker1'
    union:
      connection:
        host: 'dns:///test-controlplane-host:443'
        insecureSkipVerify: false
      auth:
        authorizationMetadataKey: flyte-authorization
        clientId: ''
        clientSecretLocation: /etc/union/secret/client_secret
        enable: true
        tokenRefreshWindow: 5m
        type: ClientSecret
    admin:
      clientId: ''
      clientSecretLocation: /etc/union/secret/client_secret
      endpoint: 'dns:///test-controlplane-host:443'
      insecure: false
      insecureSkipVerify: false
    authorizer:
      authorizerClient:
        credentials: ServiceCredentials
        grpcConfig:
          host: 'dns:///test-controlplane-host:443'
          insecure: false
          insecureSkipVerify: false
      type: Authorizer
    catalog-cache:
      cache-endpoint: 'dns:///test-controlplane-host:443'
      endpoint: 'dns:///test-controlplane-host:443'
      insecure: false
      insecure-skip-verify: false
      type: cacheservicev2
      use-admin-auth: false
    logger:
      formatter:
        type: json
      level: 4
      show-source: true
    sharedService:
      metrics:
        scope: 'leaseworker:'
      security:
        allowCors: true
        allowLocalhostAccess: true
        allowedHeaders:
        - Content-Type
        allowedOrigins:
        - '*'
        secure: false
        useAuth: false
    fasttask:
      additional-worker-args:
      - --last-ack-grace-period-seconds
      - "120"
      callback-uri: http://union-operator-leaseworker.union.svc.cluster.local:15605
      grace-period-status-not-found: 2m
    plugins:
      ioutils:
        remoteFileOutputPaths:
          deckFilename: report.html
      k8s:
        co-pilot:
          image: 'cr.flyte.org/flyteorg/flytecopilot:v1.14.1'
          name: flyte-copilot-
          start-timeout: 30s
        default-cpus: 100m
        default-env-vars:
        - _U_EP_OVERRIDE: dns:///test-controlplane-host:443
        - _U_INSECURE: "false"
        - _U_INSECURE_SKIP_VERIFY: "false"
        default-memory: 100Mi
        default-pod-template-name: task-template
        disable-inject-owner-references: true
        inject-finalizer: true
    storage:
      container: "test-metadata-bucket"
      type: s3
      connection:
        auth-type: iam
        region: test-region
      enable-multicontainer: true
      limits:
        maxDownloadMBs: 1024
      cache:
        max_size_mbs: 0
        target_gc_percent: 70

