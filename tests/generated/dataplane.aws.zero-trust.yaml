apiVersion: apps/v1
kind: Deployment
metadata:
  name: union-operator-gateway
  namespace: union
  labels:
    app: gateway
    helm.sh/chart: dataplane-2026.7.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: release-name
spec:
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: gateway
        helm.sh/chart: dataplane-2026.7.0
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/instance: release-name
      annotations:
        # Envoy's xDS dynamic config is delivered by net-kourier-controller,
        # but the bootstrap file (gateway.host, auth URLs, extra routes/
        # clusters) is read at container start. Changes to bootstrap-
        # configmap.yaml must force a rollout; the checksum annotation
        # makes the pod-template hash drift when the configmap content
        # does. Mirrors the legacy serving/knative-serving.yaml workload-
        # block at .annotations.checksum/bootstrap-config.
        checksum/bootstrap-config: 3f240d72894214db42a988137de848b91a287f3971ec2127a6e58872a6c48a16
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/stats/prometheus"
    spec:
      containers:
        - name: kourier-gateway
          image: public.ecr.aws/p0i0a9q8/envoy:2026.7.0
          args:
            - --base-id 1
            - -c /tmp/config/envoy-bootstrap.yaml
            - --log-level info
            - --drain-time-s 15
          command:
            - /usr/local/bin/envoy
          env:
            - name: DRAIN_TIME_SECONDS
              value: "15"
            - name: UNION_AUTH_TENANTAUTHURL
              value: "https://test-controlplane-host/me"
            - name: UNION_AUTH_TENANTAUTHSIGNINURL
              value: "https://test-controlplane-host/login"
            - name: UNION_AUTH_TENANTCONTROLPLANEURL
              value: "https://test-controlplane-host"
            - name: UNION_AUTH_OVERRIDENORG
              value: "test-org-name"
          ports:
            - name: http-apps
              containerPort: 8081
              protocol: TCP
            - name: https-apps
              containerPort: 8444
              protocol: TCP
            - name: http-probe
              containerPort: 8090
              protocol: TCP
            - name: https-probe
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 9000
              protocol: TCP
            - name: http-static
              containerPort: 8888
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              httpHeaders:
                - name: Host
                  value: internalkourier
              path: /ready
              port: 8081
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - "curl -X POST http://localhost:9901/drain_listeners?graceful"
          volumeMounts:
            - name: config-volume
              mountPath: /tmp/config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: gateway
              topologyKey: topology.kubernetes.io/zone
            weight: 100
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
        - name: config-volume
          configMap:
            name: union-operator-gateway-envoy-bootstrap
