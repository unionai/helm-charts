# Source: knative-migration/templates/rbac.yaml
# Namespaced Role for the only namespaced resource the Job touches —
# the KnativeServing CR. Splitting this off the ClusterRole keeps the
# resourceNames-scoped permission bound to .Release.Namespace; a same-
# named CR in any other namespace cannot be patched/deleted by this SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: release-name-knative-migration
  namespace: union
  labels:
    helm.sh/chart: knative-migration-2026.5.0
    app.kubernetes.io/name: knative-migration
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
rules:
  - apiGroups: ["operator.knative.dev"]
    resources: ["knativeservings"]
    verbs: ["get", "patch", "delete"]
    resourceNames:
      - "union-operator-serving"
