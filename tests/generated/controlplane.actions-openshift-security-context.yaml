            items:
            - key: wait-for-non-peers.sh
              path: wait-for-non-peers.sh
      initContainers:
        - name: actions-migrate
          image: "registry.unionai.cloud/controlplane/services:2026.7.0"
          imagePullPolicy: IfNotPresent
          args:
            - actions
            - migrate
            - --config
            - /etc/config/*.yaml
          volumeMounts:
            - name: secrets
              mountPath: /etc/secrets/union
            - name: config
              mountPath: /etc/config/
        - name: wait-for-non-peers
          # alpine/k8s pins kubectl to the cluster's k8s minor; matches the
          # dataplane chart's convention (see dataplane/values.yaml). Override
          # via .Values.actions.coordination.image.{repository,tag} for air-
          # gapped/customer-mirrored installs.
          image: alpine/k8s:1.32.3
          command: ["/scripts/wait-for-non-peers.sh"]
          env:
          - name: SHARD_LABEL_SELECTOR
            value: "app.kubernetes.io/component=shard,app.kubernetes.io/name=actions"
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: PEER_HASHES
            valueFrom:
              configMapKeyRef:
                name: actions-coordination
                key: peer-hashes
          volumeMounts:
          - name: coordination-scripts
            mountPath: /scripts
            readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000740000
      containers:
        - name: actions
          image: "registry.unionai.cloud/controlplane/services:2026.7.0"
          imagePullPolicy: IfNotPresent
          args:
            - actions
            - serve
            - --config
            - /etc/config/*.yaml
          ports:
            - name: grpc
              containerPort: 8080
              protocol: TCP
            - name: http
              containerPort: 8089
              protocol: TCP
            - name: debug
              containerPort: 10254
              protocol: TCP
          volumeMounts:
            - name: secrets
              mountPath: /etc/secrets/union
            - name: config
              mountPath: /etc/config/
          env:
            - name: SHARD_INDEX
              value: "9"
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  divisor: "1"
                  resource: limits.memory
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  divisor: "1"
                  resource: limits.cpu
          resources:
            limits:
              cpu: 2
              memory: 4Gi
            requests:
              cpu: 1
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: debug
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: debug
            initialDelaySeconds: 3
            periodSeconds: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: actions
                  app.kubernetes.io/instance: release-name
                  app.kubernetes.io/component: shard
              topologyKey: "kubernetes.io/hostname"
