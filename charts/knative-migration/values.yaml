# Image for the kubectl runner.
image:
  repository: alpine/kubectl
  tag: "1.33.4"
  pullPolicy: IfNotPresent

# Common labels applied to all resources (Job, SA, ClusterRole, ClusterRoleBinding).
# Merged on top of the chart's own standard labels.
labels: {}

# Common annotations applied to all resources.
# The caller chooses installation mode by supplying the appropriate hook annotations.
#
#   ArgoCD PreSync hook (recommended for the operator-purge migration —
#   the cleanup must run before ArgoCD attempts to prune the orphaned
#   KnativeServing CR, otherwise its finalizer deadlocks the Sync phase):
#     argocd.argoproj.io/hook: PreSync
#     argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
#
#   Helm post-install/upgrade hook:
#     helm.sh/hook: post-install,post-upgrade
#     helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
#     helm.sh/hook-weight: "10"
#
#   Plain resources: leave empty.
annotations: {}

# Name of the KnativeServing CR whose finalizer should be cleared.
# The CR is always looked up in the chart release namespace.
knativeServingName: union-operator-serving

# Adopt the 12 Knative Serving CRDs left behind by the knative-operator
# install into a Helm release, by stamping meta.helm.sh/release-name,
# meta.helm.sh/release-namespace, and app.kubernetes.io/managed-by=Helm.
#
# Enable this ONLY if the dataplane chart will be applied via the Helm CLI
# (or any wrapper around it: Helmfile, Terraform helm_release, etc.). The
# Helm v3 client refuses to apply CRDs that already exist without those
# annotations ("invalid ownership metadata; missing key
# 'meta.helm.sh/release-name'"), and the knative-operator installs the 12
# Serving CRDs imperatively from its binary, with no Helm metadata. This
# step writes the metadata so the subsequent `helm upgrade dataplane`
# succeeds.
#
# Leave at false (default) for non-Helm install paths: ArgoCD with a Helm
# source (uses `helm template` to render and applies via its own SSA
# controller, bypassing Helm's ownership pre-flight), Pulumi, kustomize,
# raw `kubectl apply`. Stamping Helm provenance onto resources managed by
# those tools is incorrect metadata and can trigger drift-correction loops.
adoption:
  enabled: false
  # Required when adoption.enabled is true. Must EXACTLY match the release
  # name and namespace used for the dataplane chart's `helm install` /
  # `helm upgrade` invocation. There is no default: a wrong value produces
  # a silent migration "success" followed by a misleading
  # `helm upgrade dataplane` failure that blames the wrong release.
  targetRelease: ""
  targetNamespace: ""

# Job controls.
job:
  backoffLimit: 3
  # 900s = 15 min. Sized to absorb the operator finalizer's cascade GC of
  # the KnativeServing CR's dependents. The activator pod's
  # terminationGracePeriodSeconds is 600 (upstream Knative default), which
  # is the long pole; cleanup.sh step 1 uses a 720s --wait window and 900
  # leaves headroom for the rest of the script.
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 300

# Pod resources. Defaults are tiny — this Job does a handful of API calls.
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 500m
    memory: 128Mi

# Standard placement knobs. All default empty.
nodeSelector: {}
tolerations: []
affinity: {}

# Chart name/fullname overrides (Helm convention).
nameOverride: ""
fullnameOverride: ""
