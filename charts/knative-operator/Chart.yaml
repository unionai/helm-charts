apiVersion: v2
name: knative-operator
# Only consumed as a subchart of `dataplane` (legacy / non-zero-trust path).
# Knative serving CRDs are provided by the parent chart at
# `charts/dataplane/crds/`; this chart's own `crds/` ships only the 2
# `operator.knative.dev` CRDs the operator itself needs. When zero-trust
# (`zero_trust.enabled: true` + `knative-operator.enabled: false`) becomes
# the only supported mode, delete this subchart entirely along with
# `crds/knative-operator/` and the matching cloud-side appset source.
description: Deploys Knative Operator (consumed as a subchart of `dataplane`)
type: application
version: 2026.6.0
appVersion: 1.16.0
kubeVersion: ">= 1.28.0-0"
