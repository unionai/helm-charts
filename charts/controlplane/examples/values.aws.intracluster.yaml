# ============================================================================
# AWS intracluster example — Controlplane
# ============================================================================
# Overlay for the topology where controlplane and dataplane run in the same
# Kubernetes cluster. Routes CP -> DP traffic through the cluster-local DP
# nginx Service instead of through a separate ingress.
#
# Apply on top of:
#   helm template charts/controlplane \
#     -f charts/controlplane/values.yaml \
#     -f charts/controlplane/values.aws.yaml \
#     -f charts/controlplane/examples/values.aws.intracluster.yaml \
#     ...
#
# Replace `dataplane` below with the actual DP release namespace if it differs.
# ============================================================================

global:
  # CP -> DP HTTP traffic dials the DP nginx Service directly. Bypasses the
  # public LB and works without any additional DNS resolution outside the
  # cluster.
  DATAPLANE_HOST: "http://dataplane-nginx-controller.dataplane.svc.cluster.local:80"
