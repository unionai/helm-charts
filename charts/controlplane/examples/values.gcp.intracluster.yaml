# ============================================================================
# GCP intracluster example — Controlplane
# ============================================================================
# Overlay for the topology where controlplane and dataplane run in the same
# Kubernetes cluster. Routes CP -> DP traffic through the cluster-local DP
# nginx Service instead of through a separate ingress.
#
# Apply on top of:
#   helm template charts/controlplane \
#     -f charts/controlplane/values.yaml \
#     -f charts/controlplane/values.gcp.yaml \
#     -f charts/controlplane/examples/values.gcp.intracluster.yaml \
#     ...
#
# Replace `dataplane` below with the actual DP release namespace if it differs.
# ============================================================================

global:
  # CP→DP routing is handled by Phase 2 DP self-registration — the dataplane
  # operator self-reports its CP-dial endpoint on every UpdateStatus, and the
  # CP reads it from cluster.Spec.ConnectionConfig. No DATAPLANE_HOST needed.
