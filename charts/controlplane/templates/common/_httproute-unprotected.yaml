{{- define "control-plane-library.httproute-unprotected" }}
# WARNING: any route here is accessible without authentication.
# Flyteadmin acts as an auth server and is therefore publicly accessible.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "flyte.name" . }}-unprotected
  namespace: {{ template "flyte.namespace" . }}
spec:
  parentRefs:
    - name: {{ template "flyte.name" . }}
      namespace: {{ template "flyte.namespace" . }}
  hostnames:
    - {{ .Values.global.UNION_HOST | quote }}
    {{- if .Values.flyte.common.ingress.isServerless }}
    - {{ .Values.flyte.common.ingress.serverlessVanityHost | quote }}
    {{- end }}
  rules:
    # Auth / identity endpoints — publicly required for OIDC flows
    - matches:
        - path: {type: PathPrefix, value: "/.well-known"}
      backendRefs:
        - name: flyteadmin
          port: 80
    - matches:
        - path: {type: PathPrefix, value: "/login"}
      backendRefs:
        - name: flyteadmin
          port: 80
    - matches:
        - path: {type: PathPrefix, value: "/logout"}
      backendRefs:
        - name: flyteadmin
          port: 80
    - matches:
        - path: {type: PathPrefix, value: "/callback"}
      backendRefs:
        - name: flyteadmin
          port: 80
    - matches:
        - path: {type: PathPrefix, value: "/config"}
      backendRefs:
        - name: flyteadmin
          port: 80
    - matches:
        - path: {type: PathPrefix, value: "/oauth2"}
      backendRefs:
        - name: flyteadmin
          port: 80
    - matches:
        - path: {type: PathPrefix, value: "/auth"}
      backendRefs:
        - name: flyteadmin
          port: 80
    - matches:
        - path: {type: Exact, value: "/me"}
      backendRefs:
        - name: flyteadmin
          port: 80
    - matches:
        - path: {type: Exact, value: "/healthcheck"}
      backendRefs:
        - name: flyteadmin
          port: 80
    # OpenAPI / redoc — port 87 in flyteadmin
    - matches:
        - path: {type: PathPrefix, value: "/openapi"}
      backendRefs:
        - name: flyteadmin
          port: 87
    # Console healthcheck
    - matches:
        - path: {type: Exact, value: "/healthz"}
      backendRefs:
        - name: flyteconsole
          port: 80
    # Webhook endpoints
    - matches:
        - path: {type: PathPrefix, value: "/enqueue_metronome_request/v1"}
      backendRefs:
        - name: usage-service
          port: 81
    - matches:
        - path: {type: PathPrefix, value: "/enqueue_stripe_request/v1"}
      backendRefs:
        - name: usage-service
          port: 81
    - matches:
        - path: {type: PathPrefix, value: "/okta_event_webhook/v1"}
      backendRefs:
        - name: hooks-service
          port: 81
{{- end }}
