{{- define "control-plane-library.backendtrafficpolicy" }}
# BackendTrafficPolicy — enables HTTP/2 (h2c) for Envoy→gRPC backend connections.
# All GRPCRoute backends speak gRPC over HTTP/2; without this Envoy defaults to HTTP/1.1.
# One policy per GRPCRoute so h2c is scoped to gRPC traffic only.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ template "flyte.name" . }}-grpc-protected-h2c
  namespace: {{ template "flyte.namespace" . }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      name: {{ template "flyte.name" . }}-grpc-protected
  http2: {}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ template "flyte.name" . }}-grpc-unprotected-h2c
  namespace: {{ template "flyte.namespace" . }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      name: {{ template "flyte.name" . }}-grpc-unprotected
  http2: {}
{{- end }}
