{{- define "control-plane-library.httproute-auth-proxy" }}
# Routes OAuth2 token requests to the auth-proxy service.
# NOTE: The nginx version uses Lua-based token caching (client body buffer, proxy_cache).
# That caching logic is replaced in M2 with a SecurityPolicy/custom filter.
# M3 provides a basic passthrough route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-proxy
  namespace: {{ template "flyte.namespace" . }}
spec:
  parentRefs:
    - name: {{ template "flyte.name" . }}
      namespace: {{ template "flyte.namespace" . }}
  hostnames:
    - {{ .Values.global.UNION_HOST | quote }}
    {{- if .Values.flyte.common.ingress.isServerless }}
    - {{ .Values.flyte.common.ingress.serverlessVanityHost | quote }}
    {{- end }}
  rules:
    - matches:
        - path: {type: PathPrefix, value: "/auth-proxy/oauth2"}
      backendRefs:
        - name: auth-proxy-service
          port: 443
{{- end }}
