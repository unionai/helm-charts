{{- define "control-plane-library.gateway" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ template "flyte.name" . }}
  namespace: {{ template "flyte.namespace" . }}
spec:
  gatewayClassName: {{ .Values.envoyGateway.gatewayClassName }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.global.UNION_HOST | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            namespace: {{ .Values.global.TLS_SECRET_NAMESPACE }}
            name: {{ .Values.global.TLS_SECRET_NAME }}
    {{- if .Values.flyte.common.ingress.isServerless }}
    - name: https-serverless
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.flyte.common.ingress.serverlessVanityHost | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            namespace: {{ .Values.global.TLS_SECRET_NAMESPACE }}
            name: {{ .Values.global.TLS_SECRET_NAME }}
    {{- end }}
    {{- $intraHost := .Values.global.CONTROLPLANE_INTRA_CLUSTER_HOST }}
    {{- if and $intraHost (ne $intraHost .Values.global.UNION_HOST) }}
    {{- /* Intra-cluster TLS listener: dataplane operator and CP services connect using
         CONTROLPLANE_INTRA_CLUSTER_HOST as SNI. EG routes by SNI so both listeners share
         port 443 without conflict. A self-signed cert is used; clients set insecureSkipVerify=true.
         Not rendered when CONTROLPLANE_INTRA_CLUSTER_HOST equals UNION_HOST (duplicate hostname). */ -}}
    - name: https-intracluster
      protocol: HTTPS
      port: 443
      hostname: {{ $intraHost | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: controlplane-intracluster-tls-secret
    {{- end }}
{{- end }}
