{{- if and (eq (dig "services" "authorizer" "configMap" "authorizer" "type" "" .Values) "UserClouds") .Values.union.authz.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "union.authz.serviceAccountName" . }}
  labels:
    {{- include "union.authz.labels" . | nindent 4 }}
  {{- with .Values.union.authz.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
