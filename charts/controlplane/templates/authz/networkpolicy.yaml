{{- if and .Values.union.authz.enabled .Values.union.authz.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "union.authz.fullname" . }}
  labels:
    {{- include "union.authz.labels" . | nindent 4 }}
    app.kubernetes.io/component: all
spec:
  podSelector:
    matchLabels:
      {{- include "union.authz.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: all
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.union.authz.service.port }}
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL
    - ports:
        - protocol: TCP
          port: {{ .Values.union.authz.database.port }}
    {{- if eq .Values.union.authz.cache.type "redis" }}
    # Redis
    - ports:
        - protocol: TCP
          port: {{ .Values.union.authz.cache.redis.port }}
    {{- end }}
{{- end }}
