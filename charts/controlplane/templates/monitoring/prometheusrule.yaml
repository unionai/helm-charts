{{- if and .Values.monitoring.prometheusRules.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-controlplane-rules
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
spec:
  groups:
    # --- Recording rules (always active) ---
    - name: union_controlplane_recording
      interval: 30s
      rules:
        - record: union:cp:service_availability
          expr: |
            min by (namespace, deployment) (
              kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"}
              / kube_deployment_spec_replicas{namespace="{{ .Release.Namespace }}"}
            )

        - record: union:cp:pod_restart_rate_1h
          expr: |
            sum by (namespace, pod) (
              increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}"}[1h])
            )

        - record: union:cp:connect_request_rate:by_service
          expr: |
            sum by (service) (
              rate(connect:server_requests_handled_total{namespace="{{ .Release.Namespace }}"}[5m])
            )

        - record: union:cp:connect_error_rate:by_service
          expr: |
            sum by (service) (
              rate(connect:server_requests_handled_total{namespace="{{ .Release.Namespace }}", code!~"0|OK|Canceled"}[5m])
            )

        - record: union:cp:ingress_request_rate
          expr: |
            sum(rate(nginx_ingress_controller_request_duration_seconds_count{namespace="{{ .Release.Namespace }}"}[5m]))

        - record: union:cp:ingress_error_rate_5xx
          expr: |
            sum(rate(nginx_ingress_controller_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", status=~"5.."}[5m]))

    {{- if .Values.monitoring.alerting.enabled }}
    # --- Alerting rules (opt-in) ---
    - name: union_controlplane_alerts
      rules:
        - alert: UnionCPServiceDown
          expr: kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ "{{" }} $labels.deployment {{ "}}" }} has 0 available replicas"

        - alert: UnionCPHighRestartRate
          expr: |
            increase(
              kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}"}[1h]
            ) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ "{{" }} $labels.pod {{ "}}" }} restarting frequently"

        - alert: UnionCPHighConnectErrorRate
          expr: |
            (
              sum by (service) (
                rate(connect:server_requests_handled_total{namespace="{{ .Release.Namespace }}", code!~"0|OK|Canceled"}[5m])
              )
              /
              sum by (service) (
                rate(connect:server_requests_handled_total{namespace="{{ .Release.Namespace }}"}[5m])
              )
            ) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ "{{" }} $labels.service {{ "}}" }} Connect error rate > 5%"

        - alert: UnionCPIngressHighLatency
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(nginx_ingress_controller_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}"}[5m])
              )
            ) > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Ingress p99 latency > 5s"

        - alert: UnionCPIngress5xxRate
          expr: |
            sum(rate(nginx_ingress_controller_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", status=~"5.."}[5m]))
            /
            sum(rate(nginx_ingress_controller_request_duration_seconds_count{namespace="{{ .Release.Namespace }}"}[5m]))
            > 0.01
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Ingress 5xx rate > 1%"

        - alert: UnionCPExecutionsDBErrors
          expr: |
            sum(rate(executions:database:postgres:errors:postgres_error{namespace="{{ .Release.Namespace }}"}[5m])) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Executions service Postgres errors > 0.1/s"

        - alert: UnionCPQueueDispatcherBacklog
          expr: |
            queue:dispatcher:chain_queue_length{namespace="{{ .Release.Namespace }}"} > 100
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Queue dispatcher chain backlog > 100"

        - alert: UnionCPHandlerPanic
          expr: |
            increase(
              {__name__=~".+:handler_panic", namespace="{{ .Release.Namespace }}"}[1h]
            ) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Handler panic detected in CP service"
    {{- end }}
{{- end }}
