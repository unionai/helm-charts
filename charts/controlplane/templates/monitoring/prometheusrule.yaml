{{- if and .Values.monitoring.prometheusRules.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-controlplane-rules
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
spec:
  groups:
    # --- Recording rules (always active) ---
    - name: union_controlplane_recording
      interval: 30s
      rules:
        - record: union:cp:service_availability
          expr: |
            min by (namespace, deployment) (
              kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"}
              / kube_deployment_spec_replicas{namespace="{{ .Release.Namespace }}"}
            )

        - record: union:cp:pod_restart_rate_1h
          expr: |
            sum by (namespace, pod) (
              increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}"}[1h])
            )

        - record: union:cp:connect_request_rate:by_service
          expr: |
            sum by (service) (
              rate(connect:server_requests_handled_total{namespace="{{ .Release.Namespace }}"}[5m])
            )

        - record: union:cp:connect_error_rate:by_service
          expr: |
            sum by (service) (
              rate(connect:server_requests_handled_total{namespace="{{ .Release.Namespace }}", code!~"0|OK|Canceled|NotFound"}[5m])
            )

        - record: union:cp:ingress_request_rate
          expr: |
            sum(rate(nginx_ingress_controller_request_duration_seconds_count{namespace="{{ .Release.Namespace }}"}[5m]))

        - record: union:cp:ingress_error_rate_5xx
          expr: |
            sum(rate(nginx_ingress_controller_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", status=~"5.."}[5m]))

        - record: union:cp:authz:external_error_rate
          expr: |
            sum(rate(authorizer:authorizer:cloudauthorizer:connect:external:errors{namespace="{{ .Release.Namespace }}"}[5m]))
            /
            (sum(rate(authorizer:authorizer:cloudauthorizer:connect:external:authorize_duration_count{namespace="{{ .Release.Namespace }}"}[5m])) > 0 or vector(1))

    {{- if .Values.monitoring.alerting.enabled }}
    # --- Operational alerts (opt-in) ---
    # Basic health checks only. For SLO-based alerts, see monitoring.slos.
    - name: union_controlplane_alerts
      rules:
        - alert: UnionCPServiceDown
          expr: kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ "{{" }} $labels.deployment {{ "}}" }} has 0 available replicas"

        - alert: UnionCPHighRestartRate
          expr: |
            increase(
              kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}"}[1h]
            ) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ "{{" }} $labels.pod {{ "}}" }} restarting frequently"

        - alert: UnionCPHandlerPanic
          expr: |
            sum by (__name__) (
              increase(
                {__name__=~".+:handler_panic", namespace="{{ .Release.Namespace }}"}[1h]
              )
            ) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Handler panic detected in CP service"

        - alert: UnionCPAuthorizerExternalErrors
          expr: |
            sum(rate(authorizer:authorizer:cloudauthorizer:connect:external:errors{namespace="{{ .Release.Namespace }}"}[5m])) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "External authorization backend returning errors"
            description: "The external authz backend is returning errors at >0.1/s for 5+ minutes. Check external backend health."

        - alert: UnionCPAuthorizerFailOpenActive
          expr: |
            sum(rate(authorizer:authorizer:cloudauthorizer:connect:external:fail_open_activated{namespace="{{ .Release.Namespace }}"}[5m])) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Authorizer fail-open mode is actively bypassing authorization"
            description: "The external authz backend is unreachable and fail-open is allowing requests without authorization checks."

        - alert: UnionCPAuthorizerHighDenyRate
          expr: |
            (
              sum(rate(authorizer:authorizer:cloudauthorizer:connect:authz_denied{namespace="{{ .Release.Namespace }}"}[5m]))
              /
              (sum(rate(authorizer:authorizer:cloudauthorizer:connect:authz_allowed{namespace="{{ .Release.Namespace }}"}[5m])) + sum(rate(authorizer:authorizer:cloudauthorizer:connect:authz_denied{namespace="{{ .Release.Namespace }}"}[5m])))
            ) > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Authorization deny rate exceeds 50%"
            description: "More than half of authorization decisions are being denied. Possible policy misconfiguration."
    {{- end }}

    {{- if .Values.monitoring.slos.enabled }}
    # --- SLO recording rules (opt-in) ---
    - name: union_controlplane_slo_recording
      interval: 30s
      rules:
        - record: union:cp:slo:availability:ratio
          expr: |
            avg(
              kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"}
              / kube_deployment_spec_replicas{namespace="{{ .Release.Namespace }}"}
            )

        - record: union:cp:slo:connect_success_rate
          expr: |
            (
              1 - (
                (sum(rate(connect:server_requests_handled_total{namespace="{{ .Release.Namespace }}", code!~"0|OK|Canceled|NotFound"}[5m])) or vector(0))
                /
                sum(rate(connect:server_requests_handled_total{namespace="{{ .Release.Namespace }}"}[5m]))
              )
            ) or vector(1)

        - record: union:cp:slo:ingress_success_rate
          expr: |
            (
              1 - (
                (sum(rate(nginx_ingress_controller_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", status=~"5.."}[5m])) or vector(0))
                /
                sum(rate(nginx_ingress_controller_request_duration_seconds_count{namespace="{{ .Release.Namespace }}"}[5m]))
              )
            ) or vector(1)

        - record: union:cp:slo:ingress_latency_p99
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(nginx_ingress_controller_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}"}[5m])
              )
            )

        - record: union:cp:slo:error_budget_remaining
          expr: |
            1 - (
              (1 - union:cp:slo:connect_success_rate)
              / (1 - {{ .Values.monitoring.slos.targets.availability }})
            )
    {{- end }}

    {{- if and .Values.monitoring.slos.enabled .Values.monitoring.slos.alerting.enabled }}
    # --- SLO burn rate alerts (opt-in) ---
    - name: union_controlplane_slo_alerts
      rules:
        - alert: UnionCPHighErrorBudgetBurn
          expr: |
            union:cp:slo:error_budget_remaining < 0.5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "CP error budget > 50% consumed"

        - alert: UnionCPErrorBudgetExhausted
          expr: |
            union:cp:slo:error_budget_remaining < 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "CP error budget exhausted"

        - alert: UnionCPIngressLatencySLOBreach
          expr: |
            union:cp:slo:ingress_latency_p99 > {{ .Values.monitoring.slos.targets.latencyP99 }}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "CP ingress p99 latency exceeding SLO target"
    {{- end }}
{{- end }}
