{{- if .Values.monitoring.dashboards.enabled }}
{{- $label := .Values.monitoring.dashboards.label | default "grafana_dashboard" }}
{{- $labelValue := .Values.monitoring.dashboards.labelValue | default "1" }}
{{- $files := .Files.Glob "dashboards/*.json" }}
{{- range $path, $bytes := $files }}
{{- $name := trimSuffix ".json" (base $path) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-dashboard-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{ $label }}: {{ $labelValue | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
data:
  {{ base $path }}: |-
{{ $.Files.Get $path | replace "__NAMESPACE__" $.Release.Namespace | indent 4 }}
{{- end }}
{{- end }}
