{{- if and (index .Values "controlplane" | default dict).enabled (hasKey .Values.services "leasor") (not (.Values.services.leasor.disabled | default false)) -}}
{{- /*
Bespoke ConfigMap for leasor. Mirrors what the generic services renderer
(templates/configmap.yaml) would produce — same name, same labels, same
unionai.configMap-style merge of global .Values.configMap with
.Values.services.leasor.configMap.

queueSync.source defaults to `crud`: leasor reads queues from the control-plane
queue CRUD API (the cluster service's QueueService), matching Union's managed
control plane. The cluster service auto-seeds a `default` queue plus a
per-cluster queue when a dataplane registers (see insertImplicitQueue in
cluster/service/cluster.go), so no manual seeding is needed and UI-created
queues are picked up automatically.

Set services.leasor.configMap.leasor.queueSync.source: static for the
ship-without-the-CRUD-service fallback, which auto-generates queueSync.queues
from the DEPRECATED .Values.global.DATAPLANE_CLUSTER_NAME (one `default` queue
plus one per-cluster queue, both containing that single cluster name). Static
auto-generation is skipped when queueSync.queues is already set explicitly
(full override — use that to enumerate clusters in the rare multi-DP case).
DATAPLANE_CLUSTER_NAME is unused outside this static escape hatch.
*/ -}}
{{- $service := dict "config" .Values.services.leasor "key" "leasor" "Release" .Release "Values" .Values "Chart" .Chart -}}

{{- /* Replicate unionai.configMap's deep-merge of global + per-service. */ -}}
{{- $global := .Values.configMap | default dict -}}
{{- $svc := .Values.services.leasor.configMap | default dict -}}
{{- $merged := (include "unionai.deepMerge" (dict "dest" $global "source" $svc) | fromYaml) -}}
{{- if hasKey .Values "logging" -}}
  {{- $_ := set $merged "logger" (omit .Values.logging "pythonLevel") -}}
{{- end -}}

{{- /* Resolve queueSync.source (default crud). Only auto-generate static
       queues when explicitly running in static mode and none are set. */ -}}
{{- $leasor    := index $merged "leasor"    | default dict -}}
{{- $queueSync := index $leasor "queueSync" | default dict -}}
{{- $existing  := index $queueSync "queues" | default list -}}
{{- $source    := index $queueSync "source" | default "crud" -}}
{{- $_ := set $queueSync "source" $source -}}
{{- $cluster   := .Values.global.DATAPLANE_CLUSTER_NAME | default "" -}}
{{- $org       := .Values.global.UNION_ORG | default "" -}}
{{- if and (eq $source "static") (eq (len $existing) 0) (ne $cluster "") (ne $org "") -}}
  {{- $queues := list -}}
  {{- /* default queue pointing at the attached cluster */ -}}
  {{- $queues = append $queues (dict "org" $org "name" "default"  "priority" 50 "fairnessAlgorithm" 1 "clusters" (list $cluster)) -}}
  {{- /* per-cluster queue with the same name as the cluster */ -}}
  {{- $queues = append $queues (dict "org" $org "name" $cluster   "priority" 50 "fairnessAlgorithm" 1 "clusters" (list $cluster)) -}}
  {{- $_ := set $queueSync "queues" $queues -}}
{{- end -}}
{{- $_ := set $leasor "queueSync" $queueSync -}}
{{- $_ := set $merged "leasor" $leasor -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "unionai.fullname" $service }}
  labels:
    {{- include "unionai.labels" $service | nindent 4 }}
data:
  config.yaml: |
    {{- tpl ($merged | toYaml) $service | nindent 4 }}
{{- end }}
