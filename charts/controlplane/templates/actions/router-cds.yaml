{{- if and (index .Values "controlplane" | default dict).enabled .Values.actions.enabled }}
{{- $shards := (include "actions.shardsConfig" . | fromJson).partitions -}}
{{- if gt (len $shards) 1 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "actions.router.fullname" . }}-cds
  namespace: {{ include "actions.namespace" . }}
  labels:
    {{- include "actions.router.labels" . | nindent 4 }}
data:
  cds.yaml: |
    version_info: "{{ .Release.Revision }}"
    resources:
    {{- range $idx, $shard := $shards }}
    {{- $hash := include "actions.shardHash" (dict "Root" $ "shardIndex" $idx) }}
    {{- $name := printf "%s-%d-%s" (include "actions.fullname" $) $idx $hash }}
    - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
      name: actions-grpc-{{ $idx }}
      connect_timeout: 0.25s
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
        - priority: DEFAULT
          max_connections: 1000000
          max_pending_requests: 1000000
          max_requests: 1000000
          max_retries: 1000000
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: actions-grpc-{{ $idx }}
        endpoints:
        - lb_endpoints:
          - endpoint:
              address:
                socket_address:
                  address: {{ $name }}.{{ $.Release.Namespace }}.svc.cluster.local
                  port_value: 8080
              health_check_config:
                port_value: 10254
      health_checks:
      - timeout: 5s
        interval: 10s
        unhealthy_threshold: 3
        healthy_threshold: 2
        http_health_check:
          path: "/healthcheck"
    - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
      name: actions-http-{{ $idx }}
      connect_timeout: 0.25s
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
        - priority: DEFAULT
          max_connections: 1000000
          max_pending_requests: 1000000
          max_requests: 1000000
          max_retries: 1000000
      load_assignment:
        cluster_name: actions-http-{{ $idx }}
        endpoints:
        - lb_endpoints:
          - endpoint:
              address:
                socket_address:
                  address: {{ $name }}.{{ $.Release.Namespace }}.svc.cluster.local
                  port_value: 8089
              health_check_config:
                port_value: 10254
      health_checks:
      - timeout: 5s
        interval: 10s
        unhealthy_threshold: 3
        healthy_threshold: 2
        http_health_check:
          path: "/healthcheck"
    {{- end }}
{{- end }}
{{- end }}
