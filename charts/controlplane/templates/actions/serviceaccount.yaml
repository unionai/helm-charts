{{- if and (index .Values "controlplane" | default dict).enabled .Values.actions.enabled .Values.actions.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "actions.serviceAccountName" . }}
  namespace: {{ include "actions.namespace" . }}
  labels:
    {{- include "actions.labels" . | nindent 4 }}
  {{- with .Values.actions.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
