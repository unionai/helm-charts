{{- if and (index .Values "controlplane" | default dict).enabled .Values.actions.enabled }}
{{- if gt (int (include "actions.shardCount" .)) 1 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "actions.router.fullname" . }}
  namespace: {{ include "actions.namespace" . }}
  labels:
    {{- include "actions.router.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    node:
      cluster: actions-router
      id: actions-router-{{ .Release.Namespace }}

    dynamic_resources:
      cds_config:
        path_config_source:
          path: /etc/envoy/cds.yaml
      lds_config:
        path_config_source:
          path: /etc/envoy/lds.yaml

    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
{{- end }}
{{- end }}
