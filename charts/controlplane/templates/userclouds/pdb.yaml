{{- if and .Values.userclouds.enabled .Values.userclouds.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "userclouds.fullname" . }}
  labels:
    {{- include "userclouds.labels" . | nindent 4 }}
    app.kubernetes.io/component: all
spec:
  {{- if .Values.userclouds.pdb.minAvailable }}
  minAvailable: {{ .Values.userclouds.pdb.minAvailable }}
  {{- end }}
  {{- if .Values.userclouds.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.userclouds.pdb.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "userclouds.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: all
{{- end }}
