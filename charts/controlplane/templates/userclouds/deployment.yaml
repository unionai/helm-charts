{{- if .Values.userclouds.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "userclouds.fullname" . }}
  labels:
    {{- include "userclouds.labels" . | nindent 4 }}
    app.kubernetes.io/component: all
spec:
  {{- if not .Values.userclouds.autoscaling.enabled }}
  replicas: {{ .Values.userclouds.replicaCount }}
  {{- end }}
  {{- with .Values.userclouds.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "userclouds.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: all
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/userclouds/configmap.yaml") . | sha256sum }}
        {{- with .Values.userclouds.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "userclouds.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: all
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "userclouds.serviceAccountName" . }}
      {{- if .Values.userclouds.priorityClassName }}
      priorityClassName: {{ .Values.userclouds.priorityClassName | quote }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.userclouds.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.userclouds.podSecurityContext | nindent 8 }}
      containers:
        - name: userclouds-lite
          securityContext:
            {{- toYaml .Values.userclouds.securityContext | nindent 12 }}
          image: {{ tpl .Values.image.repository . }}:{{ tpl (.Values.image.tag | toString) . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.userclouds.command }}
          command:
            {{- toYaml .Values.userclouds.command | nindent 12 }}
          {{- end }}
          args:
            - serve
            - all
            - --config=/etc/userclouds/config.yaml
            - --addr=:{{ .Values.userclouds.service.port }}
            - --static={{ .Values.userclouds.staticDir }}
          ports:
            - name: http
              containerPort: {{ .Values.userclouds.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.userclouds.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.userclouds.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.userclouds.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.userclouds.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.userclouds.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.userclouds.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.userclouds.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.userclouds.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.userclouds.resources | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          {{- with .Values.userclouds.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/userclouds
              readOnly: true
            - name: db-pass
              mountPath: /etc/db
            - name: tmp
              mountPath: /tmp
            {{- with .Values.userclouds.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "userclouds.fullname" . }}-config
        - name: db-pass
          secret:
            secretName: {{ tpl .Values.defaults.dbSecretName . }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.userclouds.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.userclouds.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.userclouds.affinity }}
      affinity:
        {{- toYaml .Values.userclouds.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "userclouds.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: all
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.userclouds.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.userclouds.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
