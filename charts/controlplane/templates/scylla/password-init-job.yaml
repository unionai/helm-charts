{{- if and .Values.scylla.enabled (not .Values.scylla.developerMode) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: scylladb-password-init
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: password-init
          image: scylladb/scylla:{{ .Values.scylla.scyllaImage.tag }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              SCYLLA_HOST="{{ .Values.scylla.fullnameOverride }}-client.{{ .Release.Namespace }}.svc.cluster.local"
              SCYLLA_PORT=9042
              NEW_PASS=$(cat /etc/secrets/union/scylla-password)
              USER={{ .Values.scylla.username | default "cassandra" }}
              DEFAULT_PASS=cassandra

              echo "Waiting for ScyllaDB at $SCYLLA_HOST:$SCYLLA_PORT..."
              until bash -c "echo > /dev/tcp/$SCYLLA_HOST/$SCYLLA_PORT" 2>/dev/null; do
                echo "  Can't connect to scylla port, retrying..."
                sleep 5
              done
              echo "Scylla port is reachable."

              # Check if the new password already works (e.g. job re-ran).
              # Only alter if it doesn't.
              if cqlsh "$SCYLLA_HOST" -u "$USER" -p "$NEW_PASS" \
                   -e "DESCRIBE CLUSTER" 2>/dev/null; then
                echo "$USER - Password already set — nothing to do."
              elif cqlsh "$SCYLLA_HOST" -u "$USER" -p "$DEFAULT_PASS" \
                   -e "ALTER USER '${USER}' WITH PASSWORD '${NEW_PASS}';" 2>/dev/null; then
                echo "$USER - Password changed successfully."
              else
                echo "ERROR: $USER - Cannot authenticate with default or new password."
                exit 1
              fi
          volumeMounts:
            - name: secrets
              mountPath: /etc/secrets/union
      volumes:
        - name: secrets
          secret:
            secretName: {{ .Values.global.KUBERNETES_SECRET_NAME }}
{{- end }}
