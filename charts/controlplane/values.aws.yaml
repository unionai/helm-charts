# Union Control Plane — AWS overlay.
# Layer on top of values.yaml. Topology (intracluster, split-cluster, etc.)
# is decided by env-layer DNS + LB annotations, not by this overlay.

global:
  # --- Deployment Identity ---
  UNION_HOST: ""              # Control plane FQDN (e.g. "mycompany.union.ai")
  UNION_ORG: ""               # Organization name (must match dataplane)

  # --- AWS Infrastructure ---
  AWS_REGION: ""              # e.g. "us-west-2"
  DB_HOST: ""                 # RDS endpoint
  DB_NAME: ""
  DB_USER: ""
  DB_DEBUG: false             # Enable GORM SQL debug logging
  BUCKET_NAME: ""             # S3 bucket for metadata
  ARTIFACTS_BUCKET_NAME: ""   # S3 bucket for artifacts
  KUBERNETES_SECRET_NAME: ""  # K8s secret with DB password under key "pass.txt"

  # --- Images ---
  IMAGE_REPOSITORY_PREFIX: "registry.unionai.cloud/controlplane"

  # --- Ingress ---
  INGRESS_PROVIDER: nginx     # nginx | envoy | both

  # --- AWS IAM (IRSA) ---
  ARTIFACT_IAM_ROLE_ARN: ""   # IAM role for the artifacts service
  FLYTEADMIN_IAM_ROLE_ARN: "" # IAM role shared by flyteadmin, datacatalog, cacheservice

  # --- Service-to-Service OAuth2 ---
  INTERNAL_CLIENT_ID: ""      # client_credentials client ID
  AUTH_TOKEN_URL: ""          # OAuth2 token endpoint
  OIDC_S2S_SCOPE: ""          # Okta: leave empty. Entra ID: "api://my-app/.default"

configMap:
  connection:
    region: '{{ .Values.global.AWS_REGION }}'

flyte:
  region: '{{ .Values.global.AWS_REGION }}'
  storage:
    type: s3
    s3:
      region: "{{ .Values.global.AWS_REGION }}"
  configmap:
    adminServer:
      connection:
        region: '{{ .Values.global.AWS_REGION }}'

      # --- OIDC Authentication ---
      # Fill in the IdP-specific fields below. Defaults beyond these (claims,
      # cookie settings, etc.) live in base values.yaml's
      # `flyte.configmap.adminServer.auth` block.
      auth:
        appAuth:
          externalAuthServer:
            # OIDC issuer base URL.
            #   Okta:      https://dev-123456.okta.com/oauth2/default
            #   Entra ID:  https://login.microsoftonline.com/{tenant-id}/v2.0
            baseUrl: ""
            # OIDC metadata discovery path (relative to baseUrl).
            #   Okta:      .well-known/oauth-authorization-server  (default)
            #   Entra ID:  .well-known/openid-configuration
            metadataUrl: ".well-known/oauth-authorization-server"
          thirdPartyConfig:
            flyteClient:
              # CLI / SDK PKCE client.
              #   Okta:      "0oa..."
              #   Entra ID:  "<app-uuid>"
              clientId: ""
              # Entra ID only — leave empty for Okta.
              audience: ""
        userAuth:
          openId:
            # Browser login.
            #   Okta:      https://dev-123456.okta.com/oauth2/default
            #   Entra ID:  https://login.microsoftonline.com/{tenant-id}/v2.0
            baseUrl: ""
            #   Okta:      "0oa..."
            #   Entra ID:  "<app-uuid>"
            clientId: ""

  # --- AWS IRSA Annotations ---
  # If your cluster's AWS pod identity webhook uses a custom
  # --annotation-prefix, replace each annotation key below with
  # <custom-prefix>/role-arn.
  flyteadmin:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "{{ .Values.global.FLYTEADMIN_IAM_ROLE_ARN }}"
  datacatalog:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "{{ .Values.global.FLYTEADMIN_IAM_ROLE_ARN }}"
  cacheservice:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "{{ .Values.global.FLYTEADMIN_IAM_ROLE_ARN }}"

services:
  artifacts:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "{{ .Values.global.ARTIFACT_IAM_ROLE_ARN }}"

scylla:
  storageClass:
    provisioner: "ebs.csi.eks.amazonaws.com"
    parameters:
      type: gp2
      fsType: ext4

# EKS manages controller-manager, scheduler, etcd, and kube-proxy internally —
# their metrics endpoints aren't reachable from the cluster. Disable scraping
# + alerting to avoid false-positive TargetDown alerts.
monitoring:
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  defaultRules:
    rules:
      kubeControllerManager: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
      kubeProxy: false
      etcd: false
