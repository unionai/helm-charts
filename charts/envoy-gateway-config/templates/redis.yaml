{{- if .Values.config.envoyGateway.rateLimit.backend.redis.url }}
# Minimal Redis deployment for envoyproxy/ratelimit.
# When config.envoyGateway.rateLimit.backend.redis.url is set, EG auto-deploys envoyproxy/ratelimit
# in this namespace and expects a Redis instance at the configured URL.
# Service name: redis-ratelimit → URL: redis://redis-ratelimit.envoy-gateway-system.svc.cluster.local:6379
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-ratelimit
  namespace: envoy-gateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-ratelimit
  template:
    metadata:
      labels:
        app: redis-ratelimit
      annotations:
        # Redis is only accessed within the cluster by envoyproxy/ratelimit — no Linkerd proxy needed.
        linkerd.io/inject: disabled
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-ratelimit
  namespace: envoy-gateway-system
spec:
  selector:
    app: redis-ratelimit
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
