# Opt-in zero-trust mode (https://www.union.ai/docs/v2/union/security/). 
# It's stronly recommended to enable this for production deployments.

# zero_trust.enabled renders the Kourier+Envoy gateway + dataproxy; 
# knative-operator.enabled must be set false separately because Helm evaluates 
# the subchart condition at parse time.
zero_trust:
  enabled: true
knative-operator:
  enabled: false

# The values below are required for zero-trust mode and are set here
# unconditionally, regardless of cloud environment.
# Most existing customer releases likely already have tunnel 
# service enabled; we set it explicitly for safety.
operator:
  enableTunnelService: true
config:
  catalog:
    catalog-cache:
      use-admin-auth: true