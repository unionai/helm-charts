# Opt-in zero-trust mode (https://www.union.ai/docs/v2/union/security/). 
# It's stronly recommended to enable this for production deployments.

# zero_trust.enabled renders the Kourier+Envoy gateway + dataproxy; 
# knative-operator.enabled must be set false separately because Helm evaluates 
# the subchart condition at parse time.
zero_trust:
  enabled: true
knative-operator:
  enabled: false

# catalog-cache admin auth is required for zero-trust regardless of cloud
# environment: the per-cloud overlays disable it for the intra-cluster assumption,
# but zero-trust talks to a remote CP that requires OAuth.
config:
  catalog:
    catalog-cache:
      use-admin-auth: true