{{- if and .Values.flytepropeller.enabled .Values.flytepropeller.priorityClass.create .Values.flytepropeller.priorityClassName (not .Values.low_privilege) }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.flytepropeller.priorityClassName }}
  labels:
    {{- include "flytepropeller.labels" . | nindent 4 }}
value: {{ .Values.flytepropeller.priorityClass.value | int }}
globalDefault: false
description: "Priority for flytepropeller so it schedules ahead of task pods. Uses a custom class rather than a reserved system class (e.g. system-cluster-critical), which GKE restricts to kube-system."
{{- end }}
