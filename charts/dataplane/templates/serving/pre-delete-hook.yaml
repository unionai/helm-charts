{{- if and .Values.serving.enabled (index .Values "knative-operator" "enabled") }}
---
# SA and RBAC are regular release resources (not hooks) so they exist when the pre-delete Job runs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pre-delete
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-pre-delete
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: ["operator.knative.dev"]
  resources: ["knativeservings"]
  verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-pre-delete
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-pre-delete
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-pre-delete
  namespace: {{ .Release.Namespace }}
---
# Cluster-scoped get on CRDs so the cleanup Job can check whether the
# knativeservings CRD exists before attempting to delete the CR (see the
# guard in the Job below). Cluster-scoped, so the name is namespace-qualified
# to avoid collisions between releases.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-pre-delete-{{ .Release.Namespace }}
rules:
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-pre-delete-{{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-pre-delete-{{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-pre-delete
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-pre-delete
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-pre-delete
      restartPolicy: Never
      containers:
      - name: cleanup
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          if kubectl get crd knativeservings.operator.knative.dev >/dev/null 2>&1; then
            kubectl delete knativeserving {{ include "serving.fullname" . }} \
              --ignore-not-found=true \
              --namespace {{ .Release.Namespace }}
          else
            echo "knativeservings CRD not installed; nothing to clean up"
          fi
{{- end }}
