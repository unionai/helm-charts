{{- if and .Values.serving.enabled .Values.serving.openShift.kourierGatewayScc.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "serving.kourierGateway.openShiftSccName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "serving.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    resourceNames:
      - {{ include "serving.kourierGateway.openShiftSccName" . }}
    verbs:
      - use
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "serving.kourierGateway.openShiftSccName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "serving.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "serving.kourierGateway.openShiftSccName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serving.openShift.kourierGatewayScc.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
