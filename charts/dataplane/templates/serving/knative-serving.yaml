{{- if .Values.serving.enabled }}
{{- $gateway := default dict .Values.gateway -}}
{{- $gatewayAuth := default dict $gateway.auth -}}
{{- $host := tpl .Values.host . -}}
{{- $tenantAuthURL := default (printf "https://%s/me" $host) (tpl ($gatewayAuth.tenantAuthURL | default "" | toString) .) -}}
{{- $tenantAuthSignInURL := default (printf "https://%s/login" $host) (tpl ($gatewayAuth.tenantAuthSignInURL | default "" | toString) .) -}}
{{- $tenantControlPlaneURL := default (printf "https://%s" $host) (tpl ($gatewayAuth.tenantControlPlaneURL | default "" | toString) .) -}}
{{- $authOrganization := default (tpl .Values.orgName .) (tpl ($gatewayAuth.organization | default "" | toString) .) -}}
apiVersion: operator.knative.dev/v1beta1
kind: KnativeServing
metadata:
  name: {{ include "serving.fullname" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "serving.labels" . | nindent 4 }}
spec:
  config:
    deployment:
      progress-deadline: "30m"
      queue-sidecar-cpu-request: "25m"
      queue-sidecar-cpu-limit: "1000m"
      queue-sidecar-memory-request: "400Mi"
      queue-sidecar-memory-limit: "800Mi"
      queue-sidecar-ephemeral-storage-request: "512Mi"
      queue-sidecar-ephemeral-storage-limit: "1024Mi"
      {{- if .Values.serving.extraConfig.deployment }}
      {{- tpl (.Values.serving.extraConfig.deployment | toYaml) . | nindent 6 }}
      {{- end }}
    features:
      kubernetes.podspec-affinity: "enabled"
      kubernetes.podspec-nodeselector: "enabled"
      kubernetes.podspec-tolerations: "enabled"
      kubernetes.podspec-fieldref: "enabled"
      kubernetes.podspec-dnspolicy: "enabled"
      kubernetes.podspec-schedulername: "enabled"
      kubernetes.podspec-securitycontext: "enabled"
      {{- if .Values.serving.extraConfig.features }}
      {{- tpl (.Values.serving.extraConfig.features | toYaml) . | nindent 6 }}
      {{- end }}
    network:
      ingress-class: "kourier.ingress.networking.knative.dev"
      {{- if .Values.serving.extraConfig.network }}
      {{- tpl (.Values.serving.extraConfig.network | toYaml) . | nindent 6 }}
      {{- end }}
  high-availability:
    replicas: {{ .Values.serving.replicas }}
  ingress:
    kourier:
      enabled: true
      bootstrap-configmap: "{{ include "serving.envoyBootstrapConfigMapName" . }}"
      service-type: ClusterIP
  podDisruptionBudgets:
  - name: 3scale-kourier-gateway-pdb
    minAvailable: 50%
  - name: activator-pdb
    minAvailable: 50%
  - name: webhook-pdb
    minAvailable: 50%
  registry:
    override:
      # Tag precedence: explicit serving image tag, then the shared image.union.tag
      # (set by sync), then the chart appVersion — published by publish-images-dataplane.
      3scale-kourier-gateway/kourier-gateway: {{ .Values.serving.images.envoy.repository }}:{{ .Values.serving.images.envoy.tag | default .Values.image.union.tag | default .Chart.AppVersion }}
      net-kourier-controller/controller: {{ .Values.serving.images.kourier.repository }}:{{ .Values.serving.images.kourier.tag | default .Values.image.union.tag | default .Chart.AppVersion }}
  workloads:
  - name: 3scale-kourier-gateway
    labels:
      {{- include "3scale-kourier-gateway.labels" . | nindent 6 }}
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                {{- include "3scale-kourier-gateway.selectorLabels" . | nindent 16 }}
            topologyKey: topology.kubernetes.io/zone
    annotations:
      checksum/bootstrap-config: {{ include (print $.Template.BasePath "/serving/bootstrap-configmap.yaml") . | sha256sum }}
    env:
    - container: kourier-gateway
      envVars:
      - name: UNION_AUTH_TENANTAUTHURL
        value: {{ $tenantAuthURL | quote }}
      - name: UNION_AUTH_TENANTAUTHSIGNINURL
        value: {{ $tenantAuthSignInURL | quote }}
      - name: UNION_AUTH_TENANTCONTROLPLANEURL
        value: {{ $tenantControlPlaneURL | quote }}
      - name: UNION_AUTH_OVERRIDENORG
        value: {{ $authOrganization | quote }}
    {{- with index .Values.serving.resources "3scale-kourier-gateway" }}
    resources:
    {{- range $container, $resources := . }}
      - container: {{ $container }}
        {{- $resources | toYaml | nindent 8 }}
    {{- end }}
    {{- end }}
  - name: activator
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - activator
            topologyKey: topology.kubernetes.io/zone
  - name: autoscaler
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - autoscaler
            topologyKey: topology.kubernetes.io/zone
  - name: autoscaler-hpa
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - autoscaler-hpa
            topologyKey: topology.kubernetes.io/zone
  - name: controller
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - controller
            topologyKey: topology.kubernetes.io/zone
  - name: net-kourier-controller
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - net-kourier-controller
            topologyKey: topology.kubernetes.io/zone
    env:
    - container: controller
      envVars:
      - name: KOURIER_UNION_AUTHZ_ENABLED
        value: {{ .Values.serving.auth.enabled | quote }}
    {{- with index .Values.serving.resources "net-kourier-controller" }}
    resources:
    {{- range $container, $resources := . }}
      - container: {{ $container }}
        {{- $resources | toYaml | nindent 8 }}
    {{- end }}
    {{- end }}
  - name: webhook
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - webhook
            topologyKey: topology.kubernetes.io/zone
{{- end }}
