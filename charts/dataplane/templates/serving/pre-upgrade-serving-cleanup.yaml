{{- if .Values.zero_trust.enabled }}
{{/*
Pre-upgrade migration hook for the operator-managed -> bundled Knative Serving
switch.

Zero-trust mode ships its OWN Knative Serving (the charts/dataplane/templates/
gateway/* resources, managed by Helm) under the upstream Knative names
(knative-serving-*, *.webhook.serving.knative.dev). When a customer flips
zero_trust.enabled=true while leaving serving.enabled=true, the previously
operator-managed install is still present and still owns those cluster-scoped
ClusterRoles/ClusterRoleBindings/webhook configs. Helm cannot adopt objects it
does not own, so the upgrade fails with:

  "... exists and cannot be imported into the current release: invalid ownership
   metadata; ... missing key app.kubernetes.io/managed-by ..."

This hook removes the operator-managed install BEFORE Helm applies the bundled
gateway resources.

Design:
  - Gated on zero_trust.enabled (the migration trigger), NOT serving.enabled,
    because the intended flow leaves serving.enabled=true.
  - Preferred path: delete the operator-managed KnativeServing CR and let the
    operator's finalizer garbage-collect everything it created (namespaced AND
    cluster-scoped). The operator is still running during a pre-upgrade hook, so
    this removes exactly the operator-owned objects and nothing else.
  - Fallback (operator already gone / GC stalled): strip the finalizer, then
    sweep leftovers with the selector app.kubernetes.io/managed-by!=Helm so the
    bundled (Helm-owned) resources are NEVER touched.
  - No-op once migrated: if there is no operator CR and no non-Helm knative
    cluster resources, the Job exits 0 without deleting anything, so it is safe
    to run on every subsequent upgrade.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pre-upgrade-serving
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
---
# The operator-created ClusterRoles/ClusterRoleBindings and webhook
# configurations are cluster-scoped, so the cleanup Job needs a ClusterRole;
# a namespaced Role cannot delete them.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-pre-upgrade-serving
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
rules:
- apiGroups: ["operator.knative.dev"]
  resources: ["knativeservings"]
  verbs: ["get", "list", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "delete"]
- apiGroups: [""]
  resources: ["services", "configmaps", "serviceaccounts"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
  verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-pre-upgrade-serving
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-pre-upgrade-serving
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-pre-upgrade-serving
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-pre-upgrade-serving
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
spec:
  ttlSecondsAfterFinished: 120
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-pre-upgrade-serving
      restartPolicy: Never
      containers:
      - name: cleanup
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          set -u
          NS={{ .Release.Namespace }}
          CR={{ include "serving.fullname" . }}
          # Operator-owned resources carry app.kubernetes.io/name=knative-serving
          # but NOT managed-by=Helm. The bundled (Helm) resources carry both, so
          # this selector targets only operator leftovers.
          SEL='app.kubernetes.io/name=knative-serving,app.kubernetes.io/managed-by!=Helm'

          if ! kubectl get crd knativeservings.operator.knative.dev >/dev/null 2>&1; then
            echo "Knative operator CRD not present; nothing to migrate."
            exit 0
          fi

          CR_PRESENT=false
          if kubectl get knativeserving "$CR" -n "$NS" >/dev/null 2>&1; then
            CR_PRESENT=true
          fi

          LEFTOVERS="$(kubectl get clusterrole,clusterrolebinding -l "$SEL" -o name 2>/dev/null)"

          if [ "$CR_PRESENT" = "false" ] && [ -z "$LEFTOVERS" ]; then
            echo "No operator-managed Knative Serving found; migration already complete."
            exit 0
          fi

          if [ "$CR_PRESENT" = "true" ]; then
            echo "Deleting operator-managed KnativeServing/$CR; waiting for the operator finalizer to garbage-collect..."
            # Preferred path: keep the finalizer so the still-running operator
            # removes exactly the resources it created (cluster-scoped included).
            if kubectl delete knativeserving "$CR" -n "$NS" --timeout=180s; then
              echo "Operator finalized and garbage-collected its resources."
            else
              echo "Operator did not finalize in time (operator likely already removed); forcing."
              kubectl patch knativeserving "$CR" -n "$NS" \
                --type=merge -p '{"metadata":{"finalizers":[]}}' 2>/dev/null || true
              kubectl delete knativeserving "$CR" -n "$NS" --ignore-not-found=true --wait=false || true
            fi
          fi

          # Fallback sweep for anything the operator did not (or could not) GC.
          #
          # Cluster-scoped: safe to sweep by label. Flyte Apps (Knative Service/
          # Revision CRs) own no cluster-scoped objects, and managed-by!=Helm
          # excludes the bundled resources, so only operator leftovers match.
          echo "Sweeping operator-owned cluster-scoped leftovers (managed-by!=Helm)..."
          kubectl delete clusterrole,clusterrolebinding -l "$SEL" --ignore-not-found || true
          kubectl delete validatingwebhookconfiguration,mutatingwebhookconfiguration -l "$SEL" --ignore-not-found || true

          # Namespaced: delete the serving-install components by their fixed
          # upstream names ONLY. Never sweep namespaced workloads by label here:
          # a running Flyte App's revision Deployment can share knative labels,
          # and a label-based delete would take down the customer's app.
          echo "Removing serving-install workloads by name (Flyte App revisions are left untouched)..."
          for c in activator autoscaler autoscaler-hpa controller webhook net-kourier-controller 3scale-kourier-gateway; do
            kubectl delete deployment "$c" -n "$NS" --ignore-not-found || true
            kubectl delete service "$c" -n "$NS" --ignore-not-found || true
          done
          kubectl delete service knative-local-gateway -n "$NS" --ignore-not-found || true
          kubectl delete poddisruptionbudget activator-pdb webhook-pdb 3scale-kourier-gateway-pdb \
            -n "$NS" --ignore-not-found || true

          echo "Pre-upgrade Knative Serving migration complete."
{{- end }}
