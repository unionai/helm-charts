{{- /*-
Required Scrape Jobs

  1. serving-envoy (Critical for App Metrics)

  Purpose: Collects Envoy proxy metrics for application request/response monitoring

  Required for these usage metrics:
  - EXECUTION_METRIC_APP_REQUESTS - Request rates by response code class
  - EXECUTION_METRIC_APP_RESPONSE_TIME_P50 - 50th percentile response time
  - EXECUTION_METRIC_APP_RESPONSE_TIME_P90 - 90th percentile response time
  - EXECUTION_METRIC_APP_RESPONSE_TIME_P95 - 95th percentile response time

  Metrics collected:
  - envoy_cluster_upstream_rq_xx (request counts)
  - envoy_cluster_upstream_rq_time_bucket (response time histograms)

  Configuration location: Line 642-662 in configmap.yaml

  ---
  2. kube-state-metrics (Critical for Pod/Resource Metadata)

  Purpose: Provides Kubernetes object state metrics

  Required for these usage metrics:
  - EXECUTION_METRIC_APP_REPLICA_COUNT - Running/pending pod counts
  - All metrics using kube_pod_status_phase for filtering running pods
  - EXECUTION_METRIC_REQUEST_CPU - CPU requests
  - EXECUTION_METRIC_REQUEST_MEMORY_BYTES - Memory requests
  - EXECUTION_METRIC_LIMIT_CPU - CPU limits
  - EXECUTION_METRIC_LIMIT_MEMORY_BYTES - Memory limits

  Metrics collected:
  - kube_pod_status_phase
  - kube_pod_container_resource_requests{resource="cpu|memory"}
  - kube_pod_container_resource_limits{resource="cpu|memory"}

  Configuration location: Line 52-77 in configmap.yaml

  ---
  3. kubernetes-cadvisor (Critical for Container Resource Usage)

  Purpose: Collects container-level CPU and memory usage metrics

  Required for these usage metrics:
  - EXECUTION_METRIC_ALLOCATED_CPU_AVG - Allocated CPU per pod
  - EXECUTION_METRIC_ALLOCATED_MEMORY_BYTES_AVG - Allocated memory per pod
  - EXECUTION_METRIC_CPU_UTILIZATION - CPU utilization percentage
  - EXECUTION_METRIC_MEMORY_UTILIZATION - Memory utilization percentage
  - EXECUTION_METRIC_USED_CPU_AVG - Used CPU across containers
  - EXECUTION_METRIC_USED_MEMORY_BYTES_AVG - Used memory across containers

  Metrics collected:
  - container_cpu_usage_seconds_total
  - container_memory_working_set_bytes

  Configuration location: Line 101-137 in configmap.yaml

  ---
  4. gpu-metrics (Required for GPU Workloads)

  Purpose: Collects NVIDIA DCGM GPU metrics

  Required for these usage metrics:
  - EXECUTION_METRIC_GPU_FRAME_BUFFER_UTILIZATION - GPU memory usage
  - EXECUTION_METRIC_GPU_MEMORY_UTILIZATION - GPU memory copy utilization
  - EXECUTION_METRIC_GPU_UTILIZATION - Overall GPU utilization
  - EXECUTION_METRIC_GPU_SM_ACTIVE - Streaming multiprocessor activity
  - EXECUTION_METRIC_GPU_SM_OCCUPANCY - SM occupancy percentage

  Metrics collected:
  - DCGM_FI_DEV_FB_USED (framebuffer used)
  - DCGM_FI_DEV_FB_FREE (framebuffer free)
  - DCGM_FI_DEV_MEM_COPY_UTIL (memory copy utilization)
  - DCGM_FI_DEV_GPU_UTIL (GPU utilization)
  - DCGM_FI_PROF_SM_ACTIVE (SM active cycles)
  - DCGM_FI_PROF_SM_OCCUPANCY (SM occupancy)

  Configuration location: Line 78-86 in configmap.yaml

  ---
  Recording Rules

  Not Directly Required

  The usage service queries raw metrics directly and does not depend on the Prometheus recording rules defined in rules.yml.

  However, the recording rules in the cost_calculations_15s group (lines 743-1469) provide complementary functionality for:
  - Cost attribution (memory/CPU/GPU cost per entity)
  - Entity-level aggregations (by execution, app, workspace)
  - Pre-computed utilization metrics

  These rules use the same source metrics as the usage service but compute different aggregations. They're likely used by other Union services (e.g., billing, cost dashboards) but not by the usage service's promQuery.queries.

  ---
  Summary

  Minimum Required Configuration:

  scrape_configs:
    - job_name: 'serving-envoy'        # App request/response metrics
    - job_name: 'kube-state-metrics'   # Pod state & resource specs
    - job_name: 'kubernetes-cadvisor'  # Container CPU/memory usage
    - job_name: 'gpu-metrics'          # GPU metrics (if GPU workloads exist)

  Optional but Complementary:

  - Recording rules in cost_calculations_15s group (for cost attribution features)
  - Other scrape jobs (karpenter, opencost, etc.) - not used by usage service directly

  Dependencies:

  All four scrape jobs must be functioning for the usage service to collect complete metrics. Missing any job will result in partial or missing data for the corresponding metric categories.


Service and Pod Monitors that are intended to support Union features.

*/ -}}
{{- if and (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") .Values.serving.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "serving.fullname" . }}
  labels:
    platform.union.ai/group: union-features
    {{- include "3scale-kourier-gateway.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "3scale-kourier-gateway.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - "{{ .Release.Namespace }}"
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      honorLabels: true
      metricRelabelings:
        - sourceLabels: [__name__]
          separator: ";"
          regex: "envoy_cluster_upstream_rq_xx|envoy_cluster_upstream_rq_time_bucket"
          action: keep
{{- end }}