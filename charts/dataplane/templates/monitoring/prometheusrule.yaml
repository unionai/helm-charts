{{- if and .Values.cost.enabled (not .Values.low_privilege) (include "prometheus.useOperator" .) -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: union-opencost-rules
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
spec:
{{ .Files.Get "files/recording-rules.yml" | indent 2 }}
{{- end }}
---
{{- if index .Values "prometheus-simple" "enabled" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: union-recording-rules
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
data:
  recording_rules.yml: |
{{- if and .Values.cost.enabled (not .Values.low_privilege) }}
{{ .Files.Get "files/recording-rules.yml" | indent 4 }}
{{- else }}
    groups: []
{{- end }}
{{- end }}
