{{- if and .Values.monitoring.prometheusRules.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1")
  .Values.cost.enabled (not .Values.low_privilege) .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "unionai-dataplane.fullname" . }}-dataplane-rules
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
spec:
{{ .Files.Get "files/recording-rules.yml" | indent 2 }}
{{- end }}
---
{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: union-recording-rules
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
data:
  recording_rules.yml: |
{{- if and .Values.cost.enabled (not .Values.low_privilege) }}
{{ .Files.Get "files/recording-rules.yml" | indent 4 }}
{{- else }}
    groups: []
{{- end }}
{{- end }}
---
{{- if and .Values.monitoring.prometheusRules.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "unionai-dataplane.fullname" . }}-monitoring-rules
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
spec:
  groups:
    # --- Recording rules (always active) ---
    - name: union_dataplane_recording
      interval: 30s
      rules:
        - record: union:dp:service_availability
          expr: |
            min by (namespace, deployment) (
              kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"}
              / kube_deployment_spec_replicas{namespace="{{ .Release.Namespace }}"}
            )

        - record: union:dp:propeller:round_latency_p99
          expr: |
            flyte:propeller:all:round:round_time_unlabeled_ms{
              namespace="{{ .Release.Namespace }}",
              quantile="0.99"
            }

        - record: union:dp:propeller:active_workflows
          expr: |
            sum(flyte:propeller:all:execstats:active_workflow_executions{
              namespace="{{ .Release.Namespace }}"
            })

        - record: union:dp:propeller:queue_depth
          expr: |
            sum(flyte:propeller:all:main_depth{namespace="{{ .Release.Namespace }}"})

        - record: union:dp:operator:work_queue_failed_rate
          expr: |
            rate(union_operator:work_queue:operations_failed{
              namespace="{{ .Release.Namespace }}"
            }[5m])

        - record: union:dp:executor:active_actions
          expr: |
            executor:active_actions_count{namespace="{{ .Release.Namespace }}"}

    {{- if .Values.monitoring.alerting.enabled }}
    # --- Operational alerts (opt-in) ---
    # Basic health checks only. For SLO-based alerts, see monitoring.slos.
    - name: union_dataplane_alerts
      rules:
        - alert: UnionDPServiceDown
          expr: |
            kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ "{{" }} $labels.deployment {{ "}}" }} has 0 available replicas"

        - alert: UnionDPHighRestartRate
          expr: |
            increase(
              kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}"}[1h]
            ) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ "{{" }} $labels.pod {{ "}}" }} restarting frequently"

        - alert: UnionDPHandlerPanic
          expr: |
            increase(executor:handler_panic{namespace="{{ .Release.Namespace }}"}[1h]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Handler panic detected in DP executor"
    {{- end }}

    {{- if .Values.monitoring.slos.enabled }}
    # --- SLO recording rules (opt-in) ---
    - name: union_dataplane_slo_recording
      interval: 30s
      rules:
        - record: union:dp:slo:availability:ratio
          expr: |
            avg(
              kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"}
              / kube_deployment_spec_replicas{namespace="{{ .Release.Namespace }}"}
            )

        - record: union:dp:slo:propeller_success_rate
          expr: |
            (
              rate(flyte:propeller:all:round:success_count{namespace="{{ .Release.Namespace }}"}[5m])
              / (
                rate(flyte:propeller:all:round:success_count{namespace="{{ .Release.Namespace }}"}[5m])
                + rate(flyte:propeller:all:round:error_count{namespace="{{ .Release.Namespace }}"}[5m])
              )
            ) or vector(1)

        - record: union:dp:slo:propeller_round_latency_p99
          expr: |
            flyte:propeller:all:round:round_time_unlabeled_ms{
              namespace="{{ .Release.Namespace }}",
              quantile="0.99"
            } / 1000

        - record: union:dp:slo:executor_success_rate
          expr: |
            (
              sum(rate(executor:actions_terminated{namespace="{{ .Release.Namespace }}", phase="Succeeded"}[5m]))
              / sum(rate(executor:actions_terminated{namespace="{{ .Release.Namespace }}"}[5m]))
            ) or vector(1)

        - record: union:dp:slo:execution_success_rate
          expr: |
            (
              (union:dp:slo:propeller_success_rate + union:dp:slo:executor_success_rate) / 2
            ) or vector(1)

        - record: union:dp:slo:error_budget_remaining
          expr: |
            (
              1 - (
                (1 - union:dp:slo:execution_success_rate)
                / (1 - {{ .Values.monitoring.slos.targets.availability }})
              )
            ) or vector(1)
    {{- end }}

    {{- if and .Values.monitoring.slos.enabled .Values.monitoring.slos.alerting.enabled }}
    # --- SLO burn rate alerts (opt-in) ---
    - name: union_dataplane_slo_alerts
      rules:
        - alert: UnionDPHighErrorBudgetBurn
          expr: |
            union:dp:slo:error_budget_remaining < 0.5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "DP error budget > 50% consumed"

        - alert: UnionDPErrorBudgetExhausted
          expr: |
            union:dp:slo:error_budget_remaining < 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "DP error budget exhausted"

        - alert: UnionDPPropellerLatencySLOBreach
          expr: |
            union:dp:slo:propeller_round_latency_p99 > {{ .Values.monitoring.slos.targets.latencyP99 }}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DP propeller p99 latency exceeding SLO target"
    {{- end }}
{{- end }}
