apiVersion: v1
kind: Secret
metadata:
  name: webhook-certs
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.knativeLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
# The data is populated at install time.
{{- end }}
