apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: webhook.serving.knative.dev
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.knativeLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
webhooks:
  - admissionReviewVersions: ["v1", "v1beta1"]
    clientConfig:
      service:
        name: webhook
        namespace: {{ .Release.Namespace }}
    failurePolicy: Fail
    sideEffects: None
    name: webhook.serving.knative.dev
    timeoutSeconds: 10
    rules:
      - apiGroups:
          - autoscaling.internal.knative.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - metrics
          - metrics/status
        scope: "*"
      - apiGroups:
          - autoscaling.internal.knative.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - podautoscalers
          - podautoscalers/status
        scope: "*"
      - apiGroups:
          - networking.internal.knative.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - certificates
          - certificates/status
        scope: "*"
      - apiGroups:
          - networking.internal.knative.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - ingresses
          - ingresses/status
        scope: "*"
      - apiGroups:
          - networking.internal.knative.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - serverlessservices
          - serverlessservices/status
        scope: "*"
      - apiGroups:
          - serving.knative.dev
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - configurations
          - configurations/status
        scope: "*"
      - apiGroups:
          - serving.knative.dev
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - revisions
          - revisions/status
        scope: "*"
      - apiGroups:
          - serving.knative.dev
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - routes
          - routes/status
        scope: "*"
      - apiGroups:
          - serving.knative.dev
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - services
          - services/status
        scope: "*"
      - apiGroups:
          - serving.knative.dev
        apiVersions:
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - domainmappings
          - domainmappings/status
        scope: "*"
