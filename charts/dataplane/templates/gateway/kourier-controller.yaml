{{- $comp := index .Values.gateway.components "kourier-controller" }}
{{- $container := index $comp.containers "controller" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: net-kourier-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.knativeLabels" . | nindent 4 }}
    networking.knative.dev/ingress-provider: kourier
    app.kubernetes.io/component: net-kourier
    {{- with $comp.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $comp.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 100%
  replicas: {{ $comp.replicas | default 1 }}
  selector:
    matchLabels:
      app: net-kourier-controller
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        {{- with $comp.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app: net-kourier-controller
        {{- include "gateway.labels" . | nindent 8 }}
        {{- include "gateway.knativeLabels" . | nindent 8 }}
        networking.knative.dev/ingress-provider: kourier
        {{- with $comp.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: controller
          {{- $repo := tpl $container.image.repository $ }}
          {{- $tag := tpl ($container.image.tag | default "") $ }}
          {{- if $tag }}
          image: {{ $repo }}:{{ $tag }}
          {{- else }}
          image: {{ $repo }}
          {{- end }}
          {{- with $container.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $container.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: CERTS_SECRET_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CERTS_SECRET_NAME
              value: ""
            - name: SYSTEM_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: METRICS_DOMAIN
              value: "knative.dev/samples"
            - name: KOURIER_GATEWAY_NAMESPACE
              value: "{{ .Release.Namespace }}"
            - name: ENABLE_SECRET_INFORMER_FILTERING_BY_CERT_UID
              value: "false"
            # KUBE_API_BURST and KUBE_API_QPS allows to configure maximum burst for throttle and maximum QPS to the server from the client.
            # Setting these values using env vars is possible since https://github.com/knative/pkg/pull/2755.
            # 200 is an arbitrary value, but it speeds up kourier startup duration, and the whole ingress reconciliation process as a whole.
            - name: KUBE_API_BURST
              value: "200"
            - name: KUBE_API_QPS
              value: "200"
            {{- if .Values.gateway.auth.enable }}
            - name: KOURIER_UNION_APPS_ENABLED
              value: "true"
            {{- end }}
            {{- with $container.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $container.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http2-xds
              containerPort: 18000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            grpc:
              port: 18000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            grpc:
              port: 18000
            periodSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          {{- with $container.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      restartPolicy: Always
      serviceAccountName: net-kourier
      {{- with $comp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: net-kourier-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.knativeLabels" . | nindent 4 }}
    networking.knative.dev/ingress-provider: kourier
    app.kubernetes.io/component: net-kourier
spec:
  ports:
    - name: grpc-xds
      port: 18000
      protocol: TCP
      targetPort: 18000
    - name: http-metrics
      port: 9090
      protocol: TCP
      targetPort: 9090
  selector:
    app: net-kourier-controller
  type: ClusterIP
{{- end }}
