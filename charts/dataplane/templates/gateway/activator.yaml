{{- $comp := index .Values.gateway.components "activator" }}
{{- $container := index $comp.containers "activator" }}

{{- with $comp.hpa }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: activator
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
    {{- include "gateway.knativeLabels" $ | nindent 4 }}
    app.kubernetes.io/component: activator
spec:
  minReplicas: {{ .minReplicas }}
  maxReplicas: {{ .maxReplicas }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: activator
  metrics:
    {{- toYaml .metrics | nindent 4 }}
{{- end }}
---
{{- with $comp.pdb }}
# Activator PDB. Currently we permit unavailability of 20% of tasks at the same time.
# Given the subsetting and that the activators are partially stateful systems, we want
# a slow rollout of the new versions and slow migration during node upgrades.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: activator-pdb
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
    {{- include "gateway.knativeLabels" $ | nindent 4 }}
    app.kubernetes.io/component: activator
spec:
  minAvailable: {{ .minAvailable | quote }}
  selector:
    matchLabels:
      app: activator
{{- end }}
---
# Copyright 2018 The Knative Authors
#
# Licensed under the Apache License, Version 2.0 (the "License");
