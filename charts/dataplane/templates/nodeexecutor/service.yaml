{{- if .Values.executor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "union-operator.fullname" . }}-executor
  labels:
    platform.union.ai/prometheus-group: "union-services"
    {{- include "executor.labels" . | nindent 4 }}
  {{- with (.Values.executor.service | default dict).annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 15605
      targetPort: 15605
      protocol: TCP
      name: fasttask
    - port: 10254
      targetPort: debug
      protocol: TCP
      name: debug
  selector:
    {{- include "executor.selectorLabels" . | nindent 4 }}
{{ end }}
