{{- if .Values.executor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: executor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "executor.labels" . | nindent 4 }}
data:
  {{- with .Values.executor.task_logs }}
  task_logs.yaml: | {{ tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  enabled_plugins.yaml: |
{{- if .Values.flyteconnector.enabled }}
{{ tpl (toYaml .Values.config.enabled_plugins) $ | indent 4 }}
{{- else }}
    tasks:
{{ tpl (toYaml .Values.config.enabled_plugins.tasks) $ | indent 6 }}
{{- end }}
  config.yaml: |
    {{- /*
         When the chart-managed eager-credentials file-mount path is on
         (secrets.eagerClientCreds.enabled), the SDK reads OAuth creds + config
         + CA from mounted files via init_from_config(). The legacy
         _UNION_EAGER_API_KEY env var is redundant; flip injectSecret false
         so leaseworker/executor/operator-apps stop appending EAGER_API_KEY
         to SecurityContext.Secrets and the webhook never emits the env var
         on task pods. Users can still set injectSecret explicitly via
         values-overrides to preserve a hybrid setup if needed.
    */}}
    {{- $executorConfig := deepCopy (.Values.executor.config | default dict) }}
    {{- if eq (include "secrets.eagerClientCreds.enabled" .) "true" }}
    {{- $unionAuth := deepCopy (index $executorConfig "unionAuth" | default dict) }}
    {{- $_ := set $unionAuth "injectSecret" false }}
    {{- $_ = set $executorConfig "unionAuth" $unionAuth }}
    {{- end }}
    {{- with $executorConfig }}
    executor:
      {{- tpl (toYaml .) $ | nindent 6 }}
      {{- include "dataplane.podInjectConfig" $ | nindent 6 }}
    {{- end }}
    {{- with .Values.config.task_resource_defaults -}}
    {{ toYaml . | nindent 6 }}
    {{- end }}
    {{- $rawConfig := deepCopy (.Values.executor.raw_config | default dict) }}
    {{- if and (include "singleNamespace" $) (not (index $rawConfig "namespace_mapping")) }}
    {{- $_ := set $rawConfig "namespace_mapping" (dict "template" $.Release.Namespace) }}
    {{- end }}
    {{- with $rawConfig }}
    {{- tpl (toYaml .) $ | nindent 4 }}
    {{- end }}
    {{- if not (dig "namespace_mapping" false .Values.executor.raw_config) }}
    {{- with .Values.namespace_mapping }}
    namespace_mapping:
      {{- tpl (toYaml .) $ | nindent 6 }}
    {{- end }}
    {{- end }}
    union:
      {{- with .Values.config.union.connection }}
      connection:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.config.union.auth }}
      auth:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
    {{- with .Values.config.admin.admin }}
    admin:
      {{- tpl (toYaml .) $ | nindent 6 }}
    {{- end }}
    {{- with .Values.config.authorizer }}
    authorizer:
      {{- tpl (toYaml .) $ | nindent 6 }}
    {{- end }}
    {{- with index .Values.config.catalog "catalog-cache" }}
    catalog-cache:
      {{- tpl (toYaml .) $ | nindent 6 }}
    {{- end }}
    {{- with .Values.logging }}
    logger:
      {{- tpl (omit . "pythonLevel" | toYaml) $ | nindent 6 }}
    {{- end }}
    {{- if .Values.config.namespace_config -}}
    {{- tpl (toYaml .Values.config.namespace_config) $ | nindent 4 }}
    {{- else if and (include "singleNamespace" $) (not (index $rawConfig "namespace_mapping")) }}
    namespace_mapping:
      template: {{ .Release.Namespace }}
    {{- end }}
    {{- with .Values.executor.sharedService }}
    sharedService:
      {{- tpl (toYaml .) $ | nindent 6 }}
    {{- end }}
    {{- $execPropeller := deepCopy (.Values.executor.propeller | default dict) }}
    {{- if and (include "singleNamespace" $) (not (index $execPropeller "limit-namespace")) }}
    {{- $_ := set $execPropeller "limit-namespace" $.Release.Namespace }}
    {{- end }}
    {{- with $execPropeller }}
    propeller:
      {{- tpl (toYaml .) $ | nindent 6 }}
    {{- end }}
    {{- with .Values.executor.plugins }}
    plugins:
      {{- tpl (toYaml .) $ | nindent 6 }}
    {{- end }}
{{- $plugins := include "k8s.plugins" . | fromYaml }}
{{- $k8sConfig := $plugins.plugins.k8s | default dict }}
{{ tpl (toYaml $k8sConfig) $ | indent 8 }}
{{- with .Values.config.copilot.plugins.k8s }}
{{ tpl (toYaml .) $ | indent 8 }}
{{- end }}
    {{- tpl (include "storage" .) $ | nindent 4 }}
{{- end }}
