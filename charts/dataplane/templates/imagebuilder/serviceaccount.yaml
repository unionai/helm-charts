{{- if and (include "imagebuilder.buildkit.enabled" .) (not (include "useCommonServiceAccount" .)) (index .Values.imageBuilder.buildkit.serviceAccount "create" | default true) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "buildkit.serviceAccountName" . }}
  {{- with .Values.imageBuilder.buildkit.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{ if .Values.imageBuilder.buildkit.serviceAccount.imagePullSecret }}
imagePullSecrets:
  - name: {{ .Values.imageBuilder.buildkit.serviceAccount.imagePullSecret }}
{{- end }}
{{- end }}