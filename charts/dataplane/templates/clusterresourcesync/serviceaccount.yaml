{{- if and .Values.clusterresourcesync.enabled (not (include "singleNamespace" .)) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: union-{{ include "clusterresourcesync.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  {{- with include "clusterresourcesync.serviceAccount.annotations" . }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: union-clustersync-resource
rules:
  {{- toYaml .Values.clusterresourcesync.clusterRoleRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: union-clustersync-resource
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: union-clustersync-resource
subjects:
  - kind: ServiceAccount
    name: union-{{ include "clusterresourcesync.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: union-clustersync-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: union-{{ include "clusterresourcesync.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
