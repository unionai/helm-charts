{{- if .Values.zero_trust.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dataproxy.fullname" . }}
  labels:
    platform.union.ai/prometheus-group: "union-services"
    {{- include "dataproxy.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.dataproxy.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 10254
      targetPort: debug
      protocol: TCP
      name: debug
  selector:
    {{- include "dataproxy.selectorLabels" . | nindent 4 }}
{{- end }}
