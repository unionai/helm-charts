{{- if .Values.zero_trust.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dataproxy.fullname" . }}
  labels:
    {{- include "dataproxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dataproxy.replicas }}
  selector:
    matchLabels:
      {{- include "dataproxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        configChecksum: {{ include (print .Template.BasePath "/operator/configmap.yaml") . | sha256sum | trunc 63 | quote }}
        {{- with .Values.dataproxy.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "global.podAnnotations" . | nindent 8 }}
      labels:
        {{- include "dataproxy.podLabels" . | nindent 8 }}
    spec:
      {{- with .Values.dataproxy.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.dataproxy.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dataproxy.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.dataproxy.podSecurityContext | nindent 8 }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "union-operator.fullname" . }}
        {{- if .Values.secrets.admin.enable }}
        - name: secret-volume
          secret:
            secretName: {{ .Values.operator.secretName }}
        {{- end }}
        {{- with .Values.dataproxy.additionalVolumes -}}
        {{ tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      containers:
        - name: dataproxy
          securityContext:
            {{- toYaml .Values.dataproxy.securityContext | nindent 12 }}
          image: "{{ .Values.image.union.repository }}:{{ .Values.image.union.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.union.pullPolicy }}
          terminationMessagePolicy: FallbackToLogsOnError
          resources:
            {{- toYaml .Values.dataproxy.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/union/config
              name: config-volume
            {{- if .Values.secrets.admin.enable }}
            - mountPath: /etc/union/secret
              name: secret-volume
            {{- end }}
            {{- with .Values.dataproxy.additionalVolumeMounts -}}
            {{ tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          args:
            - dataproxy
            - serve
            - --config
            - /etc/union/config/*.yaml
          ports:
            - name: connect
              containerPort: {{ .Values.dataproxy.service.port }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.dataproxy.service.httpPort }}
              protocol: TCP
            - name: debug
              containerPort: 10254
              protocol: TCP
          env:
            {{- include "global.podEnvVars" . | nindent 12 }}
            {{- with .Values.dataproxy.podEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- include "dataproxy.scheduling" . | nindent 6 }}
      {{- include "additionalPodSpec" . | nindent 6 }}
{{- end }}
