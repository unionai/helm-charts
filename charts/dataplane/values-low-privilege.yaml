# Sets low-privilege mode and disables subcharts that require cluster-wide access.
# All other low-privilege settings (RBAC scoping, namespace limiting, operator config,
# monitoring, priorityClassName, webhook config) are auto-injected by templates
# when low_privilege is true.
low_privilege: true
fluentbit:
  enabled: true
prometheus:
  enabled: false
prometheus-simple:
  enabled: true
  # Disable the chart's own RBAC (which creates ClusterRoles).
  # A namespace-scoped Role + RoleBinding is created by the dataplane chart instead.
  rbac:
    create: false
  # kube-state-metrics: use namespace-scoped Role (not ClusterRole) and only watch the release namespace.
  # This provides pod-level metrics (kube_pod_*, kube_pod_container_*) but NOT node-level metrics
  # (kube_node_*) since nodes are cluster-scoped resources.
  kube-state-metrics:
    enabled: true
    rbac:
      useClusterRole: false
    releaseNamespace: true
opencost:
  enabled: false
imageBuilder:
  enabled: true
  buildkit:
    # Temporarily enable buildkit until we test out Depot end to end
    enabled: true
# For now, this requires a CRD to be installed
knative-operator:
  enabled: false
serving:
  enabled: false
