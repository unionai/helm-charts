# ----------------------------------------------------------------------------
# Image Builder (BuildKit) Configuration
# ----------------------------------------------------------------------------
# Rootless buildkit requires the kernel sysctl user.max_user_namespaces > 0.
# EKS managed node groups and Auto Mode nodes do not set this by default,
# so rootless buildkit fails with "no space left on device" (ENOSPC from the
# kernel when user namespace creation is denied). Use privileged mode instead.
imageBuilder:
  # Image builder defaults to authenticationType: "noop". Uncomment to
  # authenticate to ECR via the AWS provider credential chain
  # (IRSA / EC2 instance profile).
  # authenticationType: aws
  buildkit:
    rootless: false

flytepropeller: {}

flytepropellerwebhook: {}


# ----------------------------------------------------------------------------
# Monitoring Configuration (AWS/EKS specific)
# ----------------------------------------------------------------------------

# EKS manages controller-manager, scheduler, etcd, and kube-proxy internally.
# Their metrics endpoints are not accessible from within the cluster.
# -- Control plane namespace for cross-namespace RBAC (secretsWatcher).
controlplaneNamespace: "union-cp"

# Disable scraping and alerting rules for these components to avoid
# false-positive TargetDown and *Down alerts.
monitoring:
  enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  defaultRules:
    rules:
      kubeControllerManager: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
      kubeProxy: false
      etcd: false
