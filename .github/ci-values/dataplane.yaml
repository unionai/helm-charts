# CI-specific dataplane values overlay.
# Layered on top of values-provision.yaml (generated by uctl selfserve provision-dataplane-resources).
# Points storage at the in-cluster RustFS instance and disables heavy optional components.

provider: metal

storage:
  provider: compat
  endpoint: "http://rustfs.rustfs.svc.cluster.local:9000"
  accessKey: rustfsadmin
  secretKey: rustfsadmin
  bucketName: union-data
  fastRegistrationBucketName: union-data
  region: us-east-1
  disableSSL: true
  s3ForcePathStyle: true

# Image builder: push/pull via the k3d in-cluster registry.
# k3d injects k3d-registry into cluster /etc/hosts, port 5001.
imageBuilder:
  enabled: true
  defaultRepository: "k3d-registry:5001/union"
  buildkit:
    enabled: true

# Disable Knative serving + operator — smoke test is a plain task, not an app.
# This avoids ~6 heavy Knative pods (activator, autoscaler, controller, webhook,
# kourier-controller, kourier-gateway) that don't contribute to basic CI.
serving:
  enabled: false

knative-operator:
  enabled: false

# Disable monitoring stack — not needed for chart validation.
monitoring:
  enabled: false

prometheus:
  enabled: false

metrics-server:
  enabled: false

# Disable log shipping — no remote sink in CI.
fluentbit:
  enabled: false

# Disable cost tracking.
opencost:
  enabled: false
cost:
  enabled: false

# Disable GPU exporter.
dcgm-exporter:
  enabled: false

# k3d ships Traefik; skip nginx to avoid port conflicts.
ingress-nginx:
  enabled: false

# Reduce replicas to 1 for faster pod scheduling in CI.
flyteconnector:
  replicaCount: 1
