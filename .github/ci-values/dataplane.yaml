# CI-specific dataplane values overlay.
# Layered on top of values-provision.yaml (generated by uctl selfserve provision-dataplane-resources).
# Points storage at the in-cluster RustFS instance and disables heavy optional components.

# The provision command sets provider=metal but the operator binary only accepts
# aws/gcp/azure/oci/custom. Use "custom" for k3d (on-prem / bare-metal).
provider: custom

storage:
  provider: compat
  endpoint: "http://rustfs.rustfs.svc.cluster.local:9000"
  accessKey: rustfsadmin
  secretKey: rustfsadmin
  bucketName: union-data
  fastRegistrationBucketName: union-data
  region: us-east-1
  disableSSL: true
  s3ForcePathStyle: true

# Image builder: push/pull via the k3d in-cluster registry.
# k3d --registry-create maps host:5001 → container:5000 (no REGISTRY_HTTP_ADDR).
# Port 5000 is open inside the Docker cluster network; port 5001 is only the
# host-side mapping. buildkit must push to :5000. k3s containerd is configured
# to pull from http://k3d-registry:5000 via --registry-config on cluster create.
imageBuilder:
  enabled: true
  defaultRepository: "k3d-registry:5000/union"
  buildkit:
    enabled: true
    resources:
      # CPU request kept low (no limit set) so buildkit still bursts during
      # builds but doesn't reserve scheduling capacity the test pods need on the
      # 4-vCPU runner.
      requests:
        cpu: "250m"
        memory: "512Mi"
        ephemeral-storage: "5Gi"
    # k3d registry is HTTP-only; tell buildkit not to use TLS for it.
    # Both the bare hostname and host:port forms are listed because different
    # buildkit versions normalise the registry address differently.
    extraConfig: |
      [registry."k3d-registry:5000"]
        http = true
        insecure = true

      [registry."k3d-registry"]
        http = true
        insecure = true

# Knative serving is needed for the app smoke test (verify_app).
# The default install pins the 4-vCPU runner at ~96% CPU (HA replicas=2 across
# activator/autoscaler/controller/webhook/kourier, and kourier-gateway alone
# requests 1 CPU × 2). That leaves no room for the reusable/app task pods, which
# then sit in WAITING_FOR_RESOURCES forever. Trim to single-replica and shrink
# the kourier requests so the whole stack + test pods fit on the runner.
serving:
  enabled: true
  # high-availability.replicas — 1 collapses every serving component to a single
  # pod (activator, autoscaler, controller, webhook, kourier gateway/controller).
  replicas: 1
  # Knative resolves each revision's image tag → digest by querying the registry
  # from the serving controller over HTTPS via cluster DNS. The k3d in-cluster
  # registry is HTTP-only and not resolvable by coredns, so verify_app's revision
  # fails: 'failed to resolve image to digest ... Get "https://k3d-registry:5000/
  # v2/": ... no such host', and the app never activates (serve() hangs).
  # Skip tag resolution for the k3d registry — list BOTH host:port and host forms
  # since Knative's match key depends on how the image ref is normalised. The
  # kubelet still pulls the image fine via containerd's registry mirror.
  extraConfig:
    deployment:
      registries-skipping-tag-resolving: "managed.cr.union.ai,ghcr.io,docker.io,k3d-registry:5000,k3d-registry"
  resources:
    3scale-kourier-gateway:
      kourier-gateway:
        requests:
          cpu: "100m"
          memory: 128Mi
    net-kourier-controller:
      controller:
        requests:
          cpu: "100m"
          memory: 128Mi

knative-operator:
  enabled: true

# Disable monitoring stack — not needed for chart validation.
monitoring:
  enabled: false

prometheus:
  enabled: false

metrics-server:
  enabled: false

# Disable log shipping — no remote sink in CI.
fluentbit:
  enabled: false

# Disable cost tracking.
opencost:
  enabled: false
cost:
  enabled: false

# Disable GPU exporter.
dcgm-exporter:
  enabled: false

# k3d ships Traefik; skip nginx to avoid port conflicts.
ingress-nginx:
  enabled: false

# Disable components not needed for basic CI (and that have huge CPU requests).
# leaseworker default: 4 CPU / 8 Gi — would consume the entire runner.
leaseworker:
  enabled: false

# flyteconnector default: 1 CPU × HPA-min-2 = 2 CPUs; not needed for smoke test.
flyteconnector:
  enabled: false

# Lower operator/executor/proxy requests so all pods fit on the runner
# alongside k3s. The operator defaults to a 1-CPU request — the single biggest
# consumer on the 4-vCPU node — which left no room for the verify_app Knative
# revision to schedule (RevisionFailed: Insufficient cpu). It bursts to its
# 2-CPU limit when busy, so only the scheduling request is lowered.
operator:
  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"

executor:
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"

proxy:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
