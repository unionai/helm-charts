# CI-specific dataplane values overlay.
# Layered on top of values-provision.yaml (generated by uctl selfserve provision-dataplane-resources).
# Points storage at the in-cluster RustFS instance and disables heavy optional components.

# The provision command sets provider=metal but the operator binary only accepts
# aws/gcp/azure/oci/custom. Use "custom" for k3d (on-prem / bare-metal).
provider: custom

storage:
  provider: compat
  endpoint: "http://rustfs.rustfs.svc.cluster.local:9000"
  accessKey: rustfsadmin
  secretKey: rustfsadmin
  bucketName: union-data
  fastRegistrationBucketName: union-data
  region: us-east-1
  disableSSL: true
  s3ForcePathStyle: true

# Image builder: push/pull via the k3d in-cluster registry.
# k3d injects k3d-registry into cluster /etc/hosts, port 5001.
imageBuilder:
  enabled: true
  defaultRepository: "k3d-registry:5001/union"
  buildkit:
    enabled: true
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
        ephemeral-storage: "5Gi"
    # k3d registry is HTTP-only; tell buildkit not to use TLS for it.
    # Both the bare hostname and host:port forms are listed because different
    # buildkit versions normalise the registry address differently.
    extraConfig: |
      [registry."k3d-registry:5001"]
        http = true
        insecure = true

      [registry."k3d-registry"]
        http = true
        insecure = true

# Knative serving is needed for the app smoke test (verify_app).
# Resource requests are lowered to fit on the ubuntu-latest runner (4 vCPU / 16 GB).
serving:
  enabled: true

knative-operator:
  enabled: true

# Disable monitoring stack — not needed for chart validation.
monitoring:
  enabled: false

prometheus:
  enabled: false

metrics-server:
  enabled: false

# Disable log shipping — no remote sink in CI.
fluentbit:
  enabled: false

# Disable cost tracking.
opencost:
  enabled: false
cost:
  enabled: false

# Disable GPU exporter.
dcgm-exporter:
  enabled: false

# k3d ships Traefik; skip nginx to avoid port conflicts.
ingress-nginx:
  enabled: false

# Disable components not needed for basic CI (and that have huge CPU requests).
# leaseworker default: 4 CPU / 8 Gi — would consume the entire runner.
leaseworker:
  enabled: false

# flyteconnector default: 1 CPU × HPA-min-2 = 2 CPUs; not needed for smoke test.
flyteconnector:
  enabled: false

# Lower executor/proxy requests so all pods fit on the runner alongside k3s.
executor:
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"

proxy:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
