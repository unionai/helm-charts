apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rustfs
  template:
    metadata:
      labels:
        app: rustfs
    spec:
      containers:
        - name: rustfs
          image: rustfs/rustfs:latest
          # RustFS is MinIO-API-compatible; uses RUSTFS_* prefix for root credentials.
          env:
            - name: RUSTFS_ACCESS_KEY
              value: rustfsadmin
            - name: RUSTFS_SECRET_KEY
              value: rustfsadmin
          args:
            - server
            - /data
            - --address
            - ":9000"
            - --console-address
            - ":9001"
          ports:
            - name: s3api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24   # up to 2 minutes
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rustfs
spec:
  selector:
    app: rustfs
  ports:
    - name: s3api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
