name: helm
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1
        with:
          version: v4.2.0
      - name: Run linter
        run: make lint

  # `make test` runs check-vendored-crds + helm-test + kubeconform-test, with
  # helm-test and kubeconform-test fanned out by `make -j2`. They have no
  # shared state and benefit from the same caches, so collapsing the legacy
  # `validate` and `kubeconform` jobs into one runner halves cold-setup cost.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # kube-tools bundles its own Helm 3.x; install it FIRST so the
      # azure/setup-helm step below wins on PATH. Otherwise `make helm-test`
      # runs against Helm 3.11.1, which fails the controlplane chart's
      # `tpl .Values.defaults.secretName .` helper at _helpers.tpl:270
      # ("cannot retrieve Template.Basepath from values inside tpl
      # function"). Helm v4.2.0 evaluates the same call cleanly.
      - name: Set up kubeconform
        uses: yokawasa/action-setup-kube-tools@v0.11.2
      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1
        with:
          version: v4.2.0
      - name: Set up yq
        # check-vendored-crds shells out to per-CRD scripts/check.sh, which use
        # mikefarah/yq syntax.
        run: |
          YQ_VERSION=v4.43.1
          sudo curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
      # Cache `helm dep build` outputs keyed on Chart.lock content. On a hit,
      # tests/run.sh sees its sentinel + populated charts/ and skips the
      # ~50s of dep-resolution work entirely. The helm repo index cache lets
      # cache-miss runs still resolve deps from local indexes when possible.
      - name: Cache helm chart dependencies
        uses: actions/cache@v4
        with:
          path: |
            charts/*/charts/
            tests/.dep-sentinels/
            ~/.cache/helm/repository/
          key: helm-deps-${{ runner.os }}-${{ hashFiles('charts/*/Chart.lock', 'charts/*/Chart.yaml') }}
          restore-keys: |
            helm-deps-${{ runner.os }}-
      # kubeconform's schema dir is reused as long as the targeted Kubernetes
      # version doesn't change. Keyed on the kube-version we pass to
      # `helm template --kube-version` in tests/run.sh; bump the suffix when
      # that constant changes.
      - name: Cache kubeconform schemas
        uses: actions/cache@v4
        with:
          path: tests/.kubeconform-cache/
          key: kubeconform-${{ runner.os }}-k8s1.32
      - name: Run tests
        run: make test
