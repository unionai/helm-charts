name: release
on:
  push:
    branches: [main]
    paths:
      - 'charts/*/Chart.yaml'

jobs:
  create:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Record existing tags
        id: existing-tags
        run: echo "tags=$(git tag -l | tr '\n' ',')" >> "$GITHUB_OUTPUT"

      # skip_existing must be true — this workflow triggers on every Chart.yaml
      # change pushed to main, so chart-releaser will see all charts, not just
      # the ones with new versions. Without skip_existing it would fail on
      # charts that have already been released.
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # A chart version with a SemVer pre-release suffix (-alpha.N / -beta.N) is
      # not a stable release: flag its GitHub release as a pre-release so it is
      # excluded from "latest". Helm's repo index already hides pre-release
      # versions from `helm pull` unless --devel is passed, so stable consumers
      # are unaffected. chart-releaser's mark_as_latest is run-level, so this is
      # done per-chart here instead.
      - name: Flag pre-release versions as not latest
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          for f in charts/*/Chart.yaml; do
            name=$(basename "$(dirname "$f")")
            ver=$(grep '^version:' "$f" | awk '{print $2}' | tr -d '"')
            case "$ver" in
              *-alpha.*|*-beta.*)
                tag="${name}-${ver}"
                if gh release view "$tag" >/dev/null 2>&1; then
                  echo "Flagging $tag as pre-release"
                  gh release edit "$tag" --prerelease --latest=false
                fi
                ;;
            esac
          done

      - name: Generate release notes
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          EXISTING_TAGS: "${{ steps.existing-tags.outputs.tags }}"
        run: |
          git fetch --tags
          ./scripts/generate-release-notes.sh --publish
