repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      # Enable later
      # - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: tests/generated/*
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
  - repo: local
    hooks:
      - id: check-chart-version-bump
        name: Ensure Chart.yaml version is bumped with appVersion
        language: script
        entry: scripts/check-chart-version-bump.sh
        files: Chart\.yaml$
